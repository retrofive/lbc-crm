<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LBC Collection Manager — Branch 602</title>
<style>
:root {
  --bg:#ECEEF2; --surface:#fff; --s2:#F3F5F8; --border:#CDD1DC; --blt:#E2E6EE;
  --t1:#0F1B35; --t2:#596070; --t3:#9199AB;
  --acc:#E05D20; --acc-dk:#C44F18; --acc-lt:#FDF2ED;
  --cash:#1A6639; --cash-bg:#EBF5EF; --chk:#1B4A8C; --chk-bg:#EAF0F9;
  --ok:#1A6639; --ok-bg:#EBF5EF; --danger:#9C2333; --dbg:#FBEBEE;
  --r:6px; --rlg:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--t1);line-height:1.5;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:14px}

#app{display:flex;flex-direction:column;height:100vh}
.hdr{background:var(--t1);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;flex-shrink:0}
.logo{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;display:flex;align-items:baseline;gap:7px}.ver{font-size:9px;font-weight:400;letter-spacing:.05em;color:rgba(255,255,255,.45);text-transform:none}
.logo em{color:var(--acc);font-style:normal}
.nav{display:flex;gap:2px;margin-left:8px}
.ntab{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);transition:background .14s,color .14s}
.ntab:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.08)}
.ntab.on{background:rgba(255,255,255,.14);color:#fff}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.hdiv{width:1px;height:18px;background:rgba(255,255,255,.15)}

.btn{padding:6px 14px;border-radius:var(--r);font-size:13px;font-weight:500;transition:background .14s,color .14s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--acc);color:#fff}.bp:hover{background:var(--acc-dk)}
.bg{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.11)}.bg:hover{background:rgba(255,255,255,.14);color:#fff}
.bo{background:transparent;color:var(--t2);border:1px solid var(--border)}.bo:hover{background:var(--s2);color:var(--t1)}
.bsuc{background:var(--ok-bg);color:var(--ok);border:1px solid #a8d8b8}.bsuc:hover{background:#d5eedd}
.bdng{background:var(--dbg);color:var(--danger);border:1px solid #f0bfc8}.bdng:hover{background:#f5d4da}
.bsm{padding:4px 10px;font-size:12px}.bxs{padding:3px 8px;font-size:11px;border-radius:4px}

.main{flex:1;overflow-y:auto}
.view{padding:24px;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:20px}

/* Status bar */
.status-bar{background:var(--surface);border-radius:var(--rlg);border:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.badge-act{background:var(--acc-lt);color:var(--acc);border:1px solid #f5c8b0}
.badge-act .dot{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.s-info{flex:1;min-width:180px}
.s-date{font-size:20px;font-weight:700}
.s-sub{font-size:12px;color:var(--t3);margin-top:2px}
.s-stats{display:flex;gap:28px}
.sv{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.sl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600}
.sv-g{color:var(--cash)}.sv-o{color:var(--acc)}

.start-card{background:var(--surface);border:2px dashed var(--border);border-radius:var(--rlg);padding:48px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.start-card h2{font-size:17px;font-weight:600}
.start-card p{color:var(--t2);font-size:13px;max-width:340px}

.sec-hd{display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:14px;font-weight:600}
.scc{font-size:13px;color:var(--t3);font-weight:400}

.tw{background:var(--surface);border-radius:var(--rlg);border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);background:var(--s2);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--blt)}
tbody tr:last-child{border-bottom:none}
tbody tr:not(.ar):hover{background:#FAFBFD}
tbody td{padding:8px 12px;vertical-align:middle}
td.mo{font-family:Consolas,'Courier New',monospace;font-size:12px;color:var(--t2)}
td.nu{text-align:right;font-variant-numeric:tabular-nums;font-weight:500}
td.ct{text-align:center}
td.rn{color:var(--t3);font-size:12px;width:36px;text-align:center}

.chip{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.cL{background:#EDF2FB;color:#1B4B8C;border:1px solid #B8CCEE}
.cHa{background:#F2EBF9;color:#5B2D8E;border:1px solid #CCBAEB}
.cJu{background:#FFF4E6;color:#9B4A00;border:1px solid #F5CC88}
.cJr{background:#EBF5EF;color:#1A6639;border:1px solid #A8D8B8}
.cIr{background:#FFF8E6;color:#7B5900;border:1px solid #E8D088}
.pc{display:inline-block;padding:2px 7px;border-radius:4px;font-size:12px;font-weight:500}
.pcc{background:var(--cash-bg);color:var(--cash)}
.pck{background:var(--chk-bg);color:var(--chk);font-family:Consolas,monospace}
.ck-grp-hd{background:var(--chk-bg)}
.ck-grp-hd td{border-top:1px solid rgba(27,74,140,.15);border-bottom:0}
.ck-grp-hd td:first-child{border-left:3px solid var(--chk)}
.ck-grp-sub td{font-size:12.5px;border-bottom:1px solid var(--border)}
.ck-grp-sub td:first-child{border-left:3px solid rgba(27,74,140,.18)}

.ar{background:#F8F9FC}
.ar td{padding:6px 8px}
.ar input,.ar select{padding:5px 8px;border:1px solid var(--border);border-radius:4px;width:100%;font-size:12px;background:#fff;color:var(--t1);outline:none;transition:border-color .14s,box-shadow .14s}
.ar input:focus,.ar select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(224,93,32,.1)}
.mi{font-family:Consolas,monospace;font-size:11px!important}
#ab-chk{display:none;margin-top:4px}
.bdel{color:var(--t3);padding:3px 6px;border-radius:4px;font-size:17px;line-height:1;transition:color .12s,background .12s}
.bclr{background:none;border:1px solid #c0392b;color:#c0392b;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;transition:background .14s,color .14s}
.bclr:hover{background:#c0392b;color:#fff}
.badge-wrap{position:relative}
.badge-dd{cursor:pointer;user-select:none}
.badge-dd:hover{opacity:.85}
.badge-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:170px;z-index:50;overflow:hidden}
.badge-menu.on{display:block}
.badge-menu-item{padding:10px 14px;font-size:13px;cursor:pointer;transition:background .12s}
.badge-menu-item:hover{background:var(--bg)}
.badge-menu-danger{color:#c0392b;font-weight:600}
.badge-menu-danger:hover{background:#fff0f0}
.bdel:hover{color:var(--danger);background:var(--dbg)}
.bsav{color:var(--t3);padding:3px 6px;border-radius:4px;font-size:14px;line-height:1;transition:color .12s,background .12s;margin-right:2px}
.bsav:hover{color:#1a6e2e;background:#edf7f0}
.ei{width:100%;font-size:12px;padding:2px 5px;border:1px solid transparent;border-radius:4px;background:transparent;color:var(--t1)}
.ei:hover{border-color:var(--border)}
.ei:focus{border-color:var(--acc);outline:none;background:#fff}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sc2{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:16px 20px}
.sc2 h3{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:13px;color:var(--t2);border-bottom:1px solid var(--blt)}
.sr:last-child{border-bottom:none}
.sr.tot{font-weight:700;font-size:15px;color:var(--t1);margin-top:4px;padding-top:10px;border-top:2px solid var(--border);border-bottom:none}
.sv2{font-variant-numeric:tabular-nums;font-weight:600}
.sr.tot .sv2{color:var(--acc)}

.sub-row{display:flex;justify-content:flex-end;gap:12px;align-items:center}
.sub-note{font-size:12px;color:var(--t3)}

/* History */
.hc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden}
.hch{display:flex;align-items:center;gap:16px;padding:14px 20px;cursor:pointer;transition:background .12s;user-select:none}
.hch:hover{background:var(--s2)}
.hcd{font-size:15px;font-weight:700}
.hca{font-size:12px;color:var(--t3);margin-top:1px}
.hcr{margin-left:auto;text-align:right}
.hctot{font-size:15px;font-weight:700;color:var(--cash);font-variant-numeric:tabular-nums}
.hcn{font-size:12px;color:var(--t3)}
.hcar{color:var(--t3);font-size:16px;width:20px;text-align:center;transition:transform .18s}
.hcar.op{transform:rotate(180deg)}
.hcb{display:none;border-top:1px solid var(--blt);padding:16px 20px}
.hcb.op{display:block}
.hcba{display:flex;gap:8px;margin-bottom:14px}

/* Analytics */
.astats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.asc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:16px 20px}
.asc .asv{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--t1);margin-bottom:4px}
.asc .asl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:20px 24px}
.ct-hd{font-size:13px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.ctog-g{display:flex;gap:6px}
.ctog{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;color:var(--t3);border:1px solid var(--border);transition:all .14s}
.ctog.on{background:var(--t1);color:#fff;border-color:var(--t1)}
canvas{width:100%;display:block}
.at{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow-x:auto}
.dup{color:var(--cash);font-size:12px;font-weight:600}
.ddn{color:var(--danger);font-size:12px;font-weight:600}
.dna{color:var(--t3);font-size:12px}
.ea{text-align:center;padding:60px 24px;color:var(--t3)}
.ea h3{font-size:16px;margin-bottom:8px;color:var(--t2)}
/* Analytics filter & comparison */
.anl-filter{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.anl-filter-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.anl-cmp{background:var(--s2);border:1px dashed var(--acc);border-radius:8px;padding:16px;margin-bottom:14px}
.anl-cmp-hd{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--acc);margin-bottom:12px}
.anl-cmp-grid{display:grid;grid-template-columns:1fr 1px 1fr;gap:16px}
.anl-cmp-div{background:var(--border)}
.anl-cmp-col{}
.anl-cmp-lbl{font-size:11px;font-weight:600;color:var(--t3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.anl-cmp-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.anl-cmp-row span{color:var(--t2)}
.anl-cmp-row strong{display:flex;align-items:center;gap:6px}
.cup{color:var(--cash);font-size:11px;font-weight:600}
.cdn{color:var(--danger);font-size:11px;font-weight:600}

/* Search */
.srch-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;position:sticky;top:0;z-index:10}
.srch-text{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;padding:16px 20px 14px;align-items:end}
.srch-dates{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;padding:12px 20px 14px;align-items:end;background:var(--s2);border-top:1px solid var(--blt)}
.srch-dates-lbl{grid-column:1/-1;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:2px}
.srch-bar .fgrp{display:flex;flex-direction:column;gap:4px}
.srch-res-hd{display:flex;align-items:baseline;gap:10px}
.srch-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;background:var(--acc-lt);color:var(--acc);border:1px solid #f5c8b0}
.srch-cdt{font-size:11px;color:var(--t3);background:var(--s2);padding:2px 7px;border-radius:4px;white-space:nowrap}
.srch-sec-t{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;margin-top:4px}

/* Box Inventory */
.bx-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.bx-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:18px 20px;text-align:center}
.bx-val{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.bx-lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-top:5px}
.bx-add{display:flex;gap:10px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:16px 20px;margin-bottom:14px;flex-wrap:wrap}

/* Contacts */
.ct-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 0;margin:-10px 0 0}
.ct-bar input{flex:1;min-width:180px}
.ct-meta{font-size:12px;color:var(--t3)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden}
.ccard-h{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;transition:background .12s;user-select:none}
.ccard-h:hover{background:var(--s2)}
.cav{width:36px;height:36px;border-radius:50%;background:var(--t1);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.02em}
.cnm{font-weight:600;font-size:14px}
.csub{font-size:12px;color:var(--t3);margin-top:2px}
.cnote{display:inline-block;padding:1px 6px;background:var(--acc-lt);color:var(--acc);border:1px solid #f5c8b0;border-radius:3px;font-size:10px;font-weight:600;margin-left:5px;vertical-align:middle}
.ccr{margin-left:auto;text-align:right;flex-shrink:0}
.cship{font-size:12px;font-weight:600;white-space:nowrap}
.cship-y{color:#e67e22;font-weight:800}.cship-n{color:var(--t3)}
.car{color:var(--t3);font-size:14px;margin-top:3px;transition:transform .16s}
.car.op{transform:rotate(180deg)}
.csub-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px}
.cia{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 8px;border-radius:12px;text-decoration:none;border:1px solid;white-space:nowrap;transition:opacity .12s}
.cia:hover{opacity:.75}
.cia-ph{color:#1a6e2e;border-color:#a8d8b3;background:#edf7f0}
.cia-mp{color:#1a4a8c;border-color:#a8c4e8;background:#edf2fa}
.ccard-b{display:none;border-top:1px solid var(--blt);padding:14px 16px}
.ccard-b.op{display:block}
.cdet{display:grid;grid-template-columns:max-content 1fr;gap:3px 16px;font-size:13px;margin-bottom:14px;align-items:baseline}
.cdl{color:var(--t3);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.cdv a{color:var(--t1);text-decoration:none}.cdv a:hover{color:var(--acc);text-decoration:underline}
.cedit-grid{display:grid;grid-template-columns:max-content 1fr;gap:6px 12px;align-items:center;margin-bottom:14px}
.cedit-grid label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);white-space:nowrap}
.cedit-grid input{font-size:13px;padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--t1)}
.cedit-actions{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border);margin-top:4px}
.ct-scroll-nav{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:6px;z-index:50}
.ct-scroll-nav button{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--t1);color:#fff;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25);opacity:.85;transition:opacity .15s}
.ct-scroll-nav button:hover{opacity:1}
.cedit-form{padding:16px 20px;margin-bottom:4px;border-color:var(--acc)}
.rpt-wrap{width:100%;max-width:900px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:16px}
.rpt-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:16px;background:#fff;border:1px solid var(--border);border-radius:var(--r)}
.rpt-type-g{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.rpt-type-btn{padding:7px 18px;font-size:13px;font-weight:600;background:#fff;border:none;cursor:pointer;color:var(--t2);transition:background .15s,color .15s}
.rpt-type-btn.on{background:var(--acc);color:#fff}
.rpt-body{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:24px}
.rpt-hd{font-size:20px;font-weight:700;color:var(--t1);margin-bottom:2px}
.rpt-sub{font-size:12px;color:var(--t3);margin-bottom:20px}
.rpt-section{margin-bottom:24px}
.rpt-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:12px}
.rpt-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:4px}
.rpt-kpi{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.rpt-kpi .val{font-size:22px;font-weight:700;color:var(--t1)}
.rpt-kpi .lbl{font-size:11px;color:var(--t3);margin-top:2px}
.rpt-kpi .sub{font-size:11px;color:var(--t2);margin-top:3px}
.rpt-tbl{width:100%;border-collapse:collapse;font-size:13px}
.rpt-tbl th{text-align:left;padding:7px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);border-bottom:2px solid var(--border)}
.rpt-tbl td{padding:7px 10px;border-bottom:1px solid #f0f2f5;vertical-align:top}
.rpt-tbl tr:last-child td{border-bottom:none}
.rpt-tbl .nr{text-align:right;font-variant-numeric:tabular-nums}
.rpt-coll-hd{background:var(--bg);font-weight:700;font-size:12px}
.rpt-coll-hd td{padding:8px 10px;border-top:2px solid var(--border) !important;border-bottom:1px solid var(--border) !important}
.rpt-box-row td{font-size:12px;color:var(--t2);padding:5px 10px}
.rpt-no-data{text-align:center;padding:40px;color:var(--t3)}
.cedit-form-hd{font-size:13px;font-weight:700;color:var(--acc);margin-bottom:12px}
.chist-t{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.chist-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:4px 10px;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--blt);font-size:12px}
.chist-row:last-child{border-bottom:none}
.chist-date{font-weight:600;color:var(--t2);white-space:nowrap}
.chist-bol{font-family:Consolas,monospace;color:var(--t3);font-size:11px}

/* Modal */
.mb{position:fixed;inset:0;background:rgba(10,20,45,.42);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.md{background:var(--surface);border-radius:var(--rlg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(10,20,45,.22)}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--blt);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:16px;font-weight:700}
.mbody{padding:18px 22px}
.mf{padding:14px 22px;border-top:1px solid var(--blt);display:flex;justify-content:flex-end;gap:8px}
.mc{width:28px;height:28px;border-radius:4px;color:var(--t3);font-size:20px;display:flex;align-items:center;justify-content:center}
.mc:hover{background:var(--s2);color:var(--t1)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgf{grid-column:span 2}
.fgrp{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.04em}
input[type=text],input[type=date],input[type=number],input[type=email],select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);color:var(--t1);background:#fff;outline:none;width:100%;transition:border-color .14s,box-shadow .14s}
input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(224,93,32,.11)}
.ptab{width:100%;border-collapse:collapse}
.ptab td{padding:5px 0;font-size:13px;vertical-align:middle}
.ptab td:first-child{color:var(--t2)}
.ptab td:last-child{width:110px}
.ptab td input{width:100%;text-align:right}

.toast{position:fixed;bottom:20px;right:20px;background:var(--t1);color:#fff;padding:9px 16px;border-radius:var(--r);font-size:13px;z-index:200;opacity:0;transform:translateY(6px);transition:opacity .18s,transform .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.gear-btn{background:none;border:none;cursor:pointer;font-size:20px;color:rgba(255,255,255,.7);padding:4px 6px;border-radius:6px;line-height:1;transition:color .15s,background .15s}
.gear-btn:hover,.gear-btn.on{color:#fff;background:rgba(255,255,255,.12)}
#calc-btn svg{display:block;color:rgba(255,255,255,.7);transition:color .15s}
#calc-btn:hover svg,#calc-btn.on svg{color:#fff}
#calc-popup{display:none;position:fixed;top:60px;right:16px;z-index:500;background:#1e2235;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.45);width:224px;user-select:none;overflow:hidden}
#calc-popup.open{display:block}
#calc-title{background:#161a28;padding:7px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;cursor:move;display:flex;justify-content:space-between;align-items:center}
#calc-title button{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
#calc-title button:hover{color:#fff}
#calc-display{background:#0d1020;padding:10px 12px;text-align:right}
#calc-expr{font-size:11px;color:rgba(255,255,255,.4);min-height:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#calc-val{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-variant-numeric:tabular-nums}
#calc-tape{max-height:80px;overflow-y:auto;background:#0d1020;border-top:1px solid #1e2235;padding:4px 10px}
#calc-tape div{font-size:11px;color:rgba(255,255,255,.35);text-align:right;font-variant-numeric:tabular-nums}
#calc-tape div.tape-total{color:rgba(255,255,255,.75);font-weight:600}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:6px}
.ck{border:none;border-radius:7px;font-size:15px;font-weight:600;padding:13px 0;cursor:pointer;transition:filter .1s;color:#fff}
.ck:active{filter:brightness(1.3)}
.ck.op{background:#2a4fa8;font-size:17px}
.ck.op:hover{background:#3360c8}
.ck.eq{background:#1a7a3f;font-size:17px}
.ck.eq:hover{background:#1e9449}
.ck.fn{background:#252b40;font-size:13px}
.ck.fn:hover{background:#2e3550}
.ck.num{background:#1c2238}
.ck.num:hover{background:#26304d}
.ck.zero{grid-column:span 2}
.gear-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.35)}
.gear-overlay.on{display:block}
.gear-panel{position:fixed;top:0;right:0;bottom:0;width:280px;background:var(--surface);border-left:1px solid var(--border);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;overflow:hidden}
.gear-panel-body{flex:1;overflow-y:auto}
.gear-panel.on{transform:translateX(0)}
.gear-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;color:var(--t1);background:var(--t1);color:#fff}
.gear-close{background:none;border:none;cursor:pointer;font-size:16px;color:rgba(255,255,255,.7);padding:2px 6px;border-radius:4px}
.gear-close:hover{color:#fff;background:rgba(255,255,255,.15)}
.gear-section{padding:12px 0}
.gear-section+.gear-section{border-top:1px solid var(--border)}
.gear-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);padding:4px 18px 6px}
.gear-item{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;padding:10px 18px;cursor:pointer;text-align:left;transition:background .12s}
.gear-item:hover{background:var(--bg)}
.gear-item-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.gear-item-body{display:flex;flex-direction:column;gap:1px}
.gear-item-body strong{font-size:13px;color:var(--t1);font-weight:600}
.gear-item-body span{font-size:11px;color:var(--t3)}
.gear-item-danger:hover{background:#fff0f0}
.gear-item-danger strong{color:#c0392b}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.hc-editing{outline:2px solid #6366f1;outline-offset:-2px;border-radius:var(--r)}
.app-footer{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:5px 16px;font-size:11px;color:var(--t3);border-top:1px solid var(--border);background:var(--surface);letter-spacing:.03em;gap:12px}
.footer-copy{white-space:nowrap}
.footer-file{display:flex;align-items:center;gap:6px;font-size:11px;font-family:Consolas,monospace;overflow:hidden}
.footer-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.footer-dot.connected{background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,.5)}
.footer-dot.disconnected{background:#6b7280}
.footer-path{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t2)}
#pause-banner{background:#b45309;color:#fff;padding:7px 20px;font-size:12px;font-weight:700;display:none;align-items:center;gap:10px;letter-spacing:.04em;flex-shrink:0}
#pause-banner .pb-label{font-size:10px;font-weight:800;letter-spacing:.1em;background:rgba(0,0,0,.2);padding:2px 7px;border-radius:3px}
#pause-banner .pb-info{font-weight:400;opacity:.92;flex:1}
#pause-banner .pb-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#fff;padding:3px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.04em}
#pause-banner .pb-btn:hover{background:rgba(255,255,255,.3)}
</style>
</head>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fd(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return`${m}/${d}/${y}`;}
function fm(n){const v=parseFloat(n);if(!v&&v!==0)return'—';return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmi(n){return'$'+(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tod(){return new Date().toISOString().slice(0,10);}
function mlbl(k){const[y,m]=k.split('-');const n=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return n[+m-1]+" '"+y.slice(2);}
// Total value of a collection including any manual Other amount
function collVal(c){return c.boxes.reduce((s,b)=>s+(parseFloat(b.cost)||0),0)+(parseFloat(c.other)||0);}
function collCash(c){let v=0;c.boxes.forEach(b=>{if(b.payment==='cash')v+=parseFloat(b.cost)||0;else if(b.payment==='split')v+=parseFloat(b.cashAmount)||0;});return v+(parseFloat(c.other)||0);}
function collChk(c){let v=0;c.boxes.forEach(b=>{if(b.payment==='check')v+=parseFloat(b.cost)||0;else if(b.payment==='split')v+=parseFloat(b.checkAmount)||0;});return v;}

  save(){
    localStorage.setItem(DB,JSON.stringify(this.data));
    if(this.fileHandle)this._saveToFile();
  },
  async _saveToFile(){
    try{
      const w=await this.fileHandle.createWritable();
      await w.write(JSON.stringify(this.data,null,2));
      await w.close();
    }catch(e){
      if(e.name==='NotAllowedError'){
        this.fileHandle=null;
        this._forgetHandle();
        this._updateFileStatus();
        toast('Data file permission lost. Data saved to browser only.');
      }
    }
  },
  async manualRefresh(){
    if(!this.fileHandle){toast('No data file connected.');return;}
    const btn=document.getElementById('refresh-btn');
    if(btn)btn.style.opacity='0.4';
    await this._readFromFile();
    if(btn)btn.style.opacity='';
    toast('Data refreshed from file.');
  },
  async _readFromFile(){
    if(!this.fileHandle)return;
    try{
      const file=await this.fileHandle.getFile();
      if(file.size===0)return;
      const text=await file.text();
      const d=JSON.parse(text);
      if(d&&typeof d==='object'){
        this.data=d;
        localStorage.setItem(DB,JSON.stringify(this.data));
        this.render();
      }
    }catch(e){/* silent — file may be mid-write on the other PC */}
  },
  async connectDataFile(){
    if(!window.showOpenFilePicker){
      alert('Your browser does not support the File System API.\nUse Chrome or Edge for this feature.');
      return;
    }
    try{
      const [handle]=await window.showOpenFilePicker({
        types:[{description:'LBC Data File',accept:{'application/json':['.json']}}],
        multiple:false
      });
      const file=await handle.getFile();
      const text=await file.text();
      try{
        const d=JSON.parse(text);
        if(!Array.isArray(d.collections))throw new Error('Invalid data file');
        const fileHasData=d.collections.length>0||(d.contacts?.length||0)>0;
        const appHasData=this.data.collections.length>0||(this.data.contacts?.length||0)>0;
        if(fileHasData&&appHasData){
          const choice=confirm(`File: ${d.collections.length} collections, ${d.contacts?.length||0} contacts.\nApp: ${this.data.collections.length} collections, ${this.data.contacts?.length||0} contacts.\n\nOK = Load from file\nCancel = Keep current app data`);
          if(choice){this.data=this._mergeData(this.data,d);localStorage.setItem(DB,JSON.stringify(this.data));this.render();}
        }else if(fileHasData){
          this.data=d;localStorage.setItem(DB,JSON.stringify(this.data));this.render();
          toast('Data loaded from file.');
        }
      }catch(err){toast('Could not read file: '+err.message);return;}
      this.fileHandle=handle;
      await this._persistHandle(handle);
      this.closeGear();
      this._updateFileStatus();
      await this._saveToFile();
      toast('Connected. All saves will write to this file automatically.');
    }catch(e){
      if(e.name!=='AbortError')toast('Could not open file: '+e.message);
    }
  },

  async newDataFile(){
    if(!window.showSaveFilePicker){
      alert('Your browser does not support the File System API.\nUse Chrome or Edge for this feature.');
      return;
    }
    try{
      const handle=await window.showSaveFilePicker({
        suggestedName:'LBC-CRM-data.json',
        types:[{description:'LBC Data File',accept:{'application/json':['.json']}}]
      });
      this.fileHandle=handle;
      await this._persistHandle(handle);
      this.closeGear();
      this._updateFileStatus();
      await this._saveToFile();
      toast('New data file created. All saves will write here automatically.');
    }catch(e){
      if(e.name!=='AbortError')toast('Could not create file: '+e.message);
    }
  },
  _openDB(){
    if(this._dbPromise)return this._dbPromise;
    this._dbPromise=new Promise((res,rej)=>{
      const r=indexedDB.open('lbc-crm-fh',1);
      r.onupgradeneeded=e=>e.target.result.createObjectStore('handles');
      r.onsuccess=e=>res(e.target.result);
      r.onerror=e=>rej(e.target.error);
    });
    return this._dbPromise;
  },
  async _persistHandle(handle){
    try{
      const db=await this._openDB();
      const tx=db.transaction('handles','readwrite');
      tx.objectStore('handles').put(handle,'main');
    }catch(e){}
  },
  async _forgetHandle(){
    try{
      const db=await this._openDB();
      const tx=db.transaction('handles','readwrite');
      tx.objectStore('handles').delete('main');
    }catch(e){}
  },
  async _restoreHandle(){
    try{
      const db=await this._openDB();
      return await new Promise((res,rej)=>{
        const tx=db.transaction('handles','readonly');
        const req=tx.objectStore('handles').get('main');
        req.onsuccess=()=>res(req.result||null);
        req.onerror=()=>res(null);
      });
    }catch(e){return null;}
  },
  _showReconnectBanner(handle){
    const existing=document.getElementById('reconnect-banner');
    if(existing)return;
    const bar=document.createElement('div');
    bar.id='reconnect-banner';
    bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#1d4ed8;color:#fff;font-size:12px;padding:7px 16px;display:flex;align-items:center;gap:10px;justify-content:center;';
    bar.innerHTML=`<span>📂 Re-connect to last data file: <strong>${handle.name}</strong></span><button onclick="App._reconnectFromBanner()" style="background:#fff;color:#1d4ed8;border:none;border-radius:4px;padding:3px 10px;font-size:12px;cursor:pointer;font-weight:600;">Reconnect</button><button onclick="this.closest('#reconnect-banner').remove()" style="background:transparent;border:none;color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;margin-left:4px;">✕</button>`;
    document.body.prepend(bar);
    this._pendingHandle=handle;
  },
  async _reconnectFromBanner(){
    const handle=this._pendingHandle;
    if(!handle)return;
    try{
      const perm=await handle.requestPermission({mode:'readwrite'});
      if(perm==='granted'){
        // Verify file still exists before marking connected
        try{ await handle.getFile(); }catch(e){
          this._pendingHandle=null;
          document.getElementById('reconnect-banner')?.remove();
          await this._forgetHandle();
          this._updateFileStatus();
          toast('File no longer exists — please connect a new data file.');
          return;
        }
        this.fileHandle=handle;
        this._pendingHandle=null;
        document.getElementById('reconnect-banner')?.remove();
        this._updateFileStatus();
        await this._readFromFile();
        toast('Reconnected to '+handle.name);
      }
    }catch(e){}
  },
  _updateFileStatus(){
    const el=document.getElementById('gear-file-status');
    const dot=document.getElementById('footer-dot');
    const path=document.getElementById('footer-path');
    if(this.fileHandle){
      if(el)el.innerHTML=`<strong style="color:#22c55e">✓ Data File Connected</strong><span>${this.fileHandle.name}</span>`;
      if(dot){dot.classList.remove('disconnected');dot.classList.add('connected');}
      if(path)path.textContent=this.fileHandle.name;
    }else{
      if(el)el.innerHTML='<strong>Connect Data File</strong><span>Auto-save to a JSON file on disk</span>';
      if(dot){dot.classList.remove('connected');dot.classList.add('disconnected');}
      if(path)path.textContent='NO FILE CONNECTED';
    }
  },
  _mergeData(current,backup){
    const merged={...backup};
    // Union contacts by id — keeps entries added on either side since last backup
    const allContacts=[...(backup.contacts||[])];
    const seenC=new Set(allContacts.map(c=>c.id));
    (current.contacts||[]).forEach(c=>{if(!seenC.has(c.id)){allContacts.push(c);seenC.add(c.id);}});
    merged.contacts=allContacts;
    // Union collections by id
    const allColls=[...(backup.collections||[])];
    const seenK=new Set(allColls.map(c=>c.id));
    (current.collections||[]).forEach(c=>{if(!seenK.has(c.id)){allColls.push(c);seenK.add(c.id);}});
    merged.collections=allColls;
    // Prefer whichever boxInventory has more log entries
    const curLog=(current.boxInventory?.log||[]).length;
    const bkLog=(backup.boxInventory?.log||[]).length;
    if(curLog>bkLog)merged.boxInventory=current.boxInventory;
    return merged;
  },
  ac(){return this.data.collections.find(c=>c.status==='active')||null;},
  paused(){return this.data.collections.find(c=>c.status==='paused')||null;},
  done(){return this.data.collections.filter(c=>c.status==='completed').sort((a,b)=>(b.collectionDate||b.startDate||'').localeCompare(a.collectionDate||a.startDate||''));},

  updatePauseBanner(){
    const p=this.paused();
    const el=document.getElementById('pause-banner');
    if(!el)return;
    if(p){
      el.style.display='flex';
      el.innerHTML=`<span class="pb-label">⏸ PAUSED</span><span class="pb-info">Collection started ${fd(p.startDate)} · ${p.boxes.length} box${p.boxes.length!==1?'es':''} · ${fm(p.boxes.reduce((s,b)=>s+(parseFloat(b.cost)||0),0))}</span><button class="pb-btn" onclick="App.resumeCollection('${p.id}')">▶ Resume</button>`;
    } else {
      el.style.display='none';
      el.innerHTML='';
    }
  },
  pauseCollection(cid){
    const c=this.data.collections.find(x=>x.id===cid);if(!c)return;
    c.status='paused';
    this.save();this.render();this.updatePauseBanner();
    toast('Collection paused. Resume any time from the banner above.');
  },
  resumeCollection(cid){
    const c=this.data.collections.find(x=>x.id===cid);if(!c)return;
    c.status='active';
    this.save();this.setView('active');this.updatePauseBanner();
    toast('Collection resumed.');
  },

  setView(v){
    this.view=v;
    this.updatePauseBanner();
    ['active','history','analytics','search','contacts','boxes','reports'].forEach(n=>{
      document.getElementById('view-'+n).style.display=n===v?'flex':'none';
      document.getElementById('tab-'+n).classList.toggle('on',n===v);
    });
    if(v==='active')this.rActive();
    else if(v==='history')this.rHistory();
    else if(v==='search')this.rSearch();
    else if(v==='contacts')this.rContacts();
    else if(v==='boxes')this.rBoxInventory();
    else if(v==='reports')this.rReports();
    else this.rAnalytics();
  },
  render(){if(this.view==='active')this.rActive();else if(this.view==='history')this.rHistory();else if(this.view==='search')this.rSearch();else if(this.view==='contacts')this.rContacts();else if(this.view==='boxes')this.rBoxInventory();else if(this.view==='reports')this.rReports();else this.rAnalytics();},

  // ── Active ────────────────────────────────────────────────────────────────
  rActive(){
    const el=document.getElementById('view-active');
    const ac=this.ac();
    if(!ac){
      const p=this.paused();
      el.innerHTML=`<div class="start-card">
        ${p?`<div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;max-width:480px;width:100%">
          <span style="font-size:22px">⏸</span>
          <div style="flex:1;text-align:left">
            <div style="font-weight:700;font-size:13px;color:#92400e">Collection Paused</div>
            <div style="font-size:12px;color:#78350f;margin-top:2px">Started ${fd(p.startDate)} · ${p.boxes.length} box${p.boxes.length!==1?'es':''} · ${fm(p.boxes.reduce((s,b)=>s+(parseFloat(b.cost)||0),0))}</div>
          </div>
          <button class="btn bp" style="white-space:nowrap" onclick="App.resumeCollection('${p.id}')">▶ Resume</button>
        </div>`:''}
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9199AB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <h2>${p?'Start a new collection period':'No active collection'}</h2>
        <p>Start a new biweekly period. Add boxes as they come in — data saves automatically. On pickup day, hit Submit &amp; Print.</p>
        <button class="btn bp" onclick="App.startNew()">Start New Collection Period</button>
      </div>`;
      return;
    }
    const counts={};let tCash=0,tChk=0;const checks={};
    ac.boxes.forEach(b=>{
      if(b.size)counts[b.size]=(counts[b.size]||0)+1;
      const c=parseFloat(b.cost)||0;
      if(b.payment==='cash')tCash+=c;
      else if(b.payment==='check'){tChk+=c;if(b.checkNumber)checks[b.checkNumber]=(checks[b.checkNumber]||0)+c;}
      else if(b.payment==='split'){
        tCash+=parseFloat(b.cashAmount)||0;
        const ca=parseFloat(b.checkAmount)||0;
        tChk+=ca;
        if(b.checkNumber)checks[b.checkNumber]=(checks[b.checkNumber]||0)+ca;
      }
    });
    const gt=tCash+tChk+(parseFloat(ac.other)||0);
    const rows=ac.boxes.map((b,i)=>this.bRow(b,i+1,ac.id,true)).join('');
    const szRows=Object.entries(counts).length
      ?Object.entries(counts).map(([sz,n])=>`<div class="sr"><span>${SZ[sz]||sz}</span><span class="sv2">${n}</span></div>`).join('')
      :`<div class="sr"><span style="color:var(--t3)">No boxes yet</span></div>`;
    const ckRows=Object.entries(checks).map(([ck,a])=>`<div class="sr"><span style="font-family:Consolas,monospace;font-size:12px">Ck #${esc(ck)}</span><span class="sv2" style="color:var(--chk)">${fm(a)}</span></div>`).join('');
    el.innerHTML=`
    ${ac.collectionDate?`<div style="background:#e67e22;color:#fff;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:6px 16px;border-radius:6px 6px 0 0;display:flex;align-items:center;gap:8px"><span style="font-size:16px">↩</span> RE-OPENED — collection date ${fd(ac.collectionDate)} is locked</div>`:''}
    <div class="status-bar" style="${ac.collectionDate?'border-radius:0 0 8px 8px;border-top:2px solid #e67e22':''}">
      <div class="badge-wrap" id="badge-wrap-${ac.id}">
        <span class="badge badge-act badge-dd" onclick="App.toggleBadgeDd('${ac.id}')"><span class="dot"></span>${ac.collectionDate?'Re-opened':'In Progress'} <span style="font-size:10px;margin-left:2px;opacity:.7">▾</span></span>
        <div class="badge-menu" id="badge-menu-${ac.id}">
          ${ac.collectionDate
            ? `<div class="badge-menu-item" onclick="App.cancelReopen('${ac.id}')">↩ Cancel Re-open</div>`
            : `<div class="badge-menu-item" onclick="App.pauseCollection('${ac.id}')">⏸ Pause Collection</div>
               <div class="badge-menu-item badge-menu-danger" onclick="App.cancelCollection('${ac.id}')">🗑 Cancel &amp; Delete</div>`
          }
        </div>
      </div>
      <div class="s-info">
        <div class="s-date">Started ${fd(ac.startDate)}</div>
        <div class="s-sub">Branch ${esc(ac.branch||this.data.settings.branch||'—')} · ${esc(ac.agent||this.data.settings.agent||'—')}</div>
      </div>
      <div class="s-stats">
        <div><div class="sv sv-o">${ac.boxes.length}</div><div class="sl">Boxes</div></div>
        <div><div class="sv sv-g">${fmi(gt)}</div><div class="sl">Total</div></div>
      </div>
      ${ac.collectionDate
        ?`<button class="btn bclr" onclick="App.deleteReopenedCol('${ac.id}')">🗑 Delete Collection</button>`
        :ac.boxes.length?`<button class="btn bclr" onclick="App.clearAllBoxes('${ac.id}')">⊘ Clear All</button>`:''
      }
    </div>
    <div>
      <div class="sec-hd" style="margin-bottom:12px">
        <div class="sec-t">Box Entries <span class="scc">(${ac.boxes.length})</span></div>
      </div>
      <div class="tw">
        <table>
          <thead><tr><th>#</th><th>BOL Number</th><th>Customer</th><th>Destination</th><th>Size</th><th style="text-align:right">Cost</th><th>Payment</th><th style="text-align:right">Net</th><th></th></tr></thead>
          <tbody>${rows}${this.addRow(ac.id)}</tbody>
        </table>
      </div>
    </div>
    <div class="sg">
      <div class="sc2"><h3>Box Count by Type</h3>${szRows}<div class="sr tot"><span>Total Boxes</span><span class="sv2">${ac.boxes.length}</span></div></div>
      <div class="sc2">
        <h3>Payment Running Total</h3>
        <div class="sr"><span>Cash</span><span class="sv2" style="color:var(--cash)">${fm(tCash)}</span></div>
        ${ckRows}
        <div class="sr"><span>Checks Total</span><span class="sv2" style="color:var(--chk)">${fm(tChk)}</span></div>
        <div class="sr tot"><span>Grand Total</span><span class="sv2">${fm(gt)}</span></div>
        <div class="sr"><span>Other</span><span class="sv2"><input type="number" min="0" step="0.01" placeholder="0.00" value="${ac.other||''}" style="width:90px;text-align:right;font-size:14px;font-weight:600" onchange="App.setOther('${ac.id}',this.value)"></span></div>
      </div>
    </div>
    <div class="sub-row">
      ${ac.collectionDate
        ? `<span class="sub-note">Re-opened — collection date ${fd(ac.collectionDate)} is locked. Save changes and return to History.</span>
           <button class="btn bo bsm" onclick="App.printCol('${ac.id}')">🖨 Print</button>
           <button class="btn bo bsm" onclick="App.saveColPdf('${ac.id}')">💾 Save PDF</button>
           <button class="btn bsuc" onclick="App.saveReopenedCol('${ac.id}')">💾 Save &amp; Return to History</button>`
        : `<span class="sub-note">Pickup day? Lock this collection and generate the print report.</span>
           <button class="btn bsuc" onclick="App.showSubmit('${ac.id}')">✓ Close Collection Period</button>`
      }
    </div>`;
  },

  bRow(b,num,cid,editable=false){
    const chip=SZCHIP[b.size]||'';
    const lbl=SZ[b.size]||b.size||'—';
    const pay=b.payment==='cash'?`<span class="pc pcc">Cash</span>`:b.payment==='check'?`<span class="pc pck">Ck #${esc(b.checkNumber)||'—'}</span>`:b.payment==='split'?`<span class="pc pcc">$${b.cashAmount||0}</span><span class="pc pck">Ck#${esc(b.checkNumber)} $${b.checkAmount||0}</span>`:'—';
    const nv=b.net||b.cost;
    if(editable){
      const szOpts=Object.entries(SZ).map(([k,v])=>`<option value="${k}"${b.size===k?' selected':''}>${v}</option>`).join('');
      const isSplit=b.payment==='split';
      const splitLbl=isSplit?`$${b.cashAmount||0}+Ck#${b.checkNumber} $${b.checkAmount||0}`:'';
      const payCell=isSplit
        ?`<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
            <select class="ei" id="ep-${b.id}" onchange="App.onRowPay(this,'${b.id}','${cid}')">
              <option value="cash">Cash</option><option value="check">Check</option><option value="split" selected>Split</option>
            </select>
            <span id="ep-split-lbl-${b.id}" style="font-size:11px;color:var(--t3)">${splitLbl}</span>
            <button class="btn bo bxs" onclick="App.showSplitModalForBox('${b.id}','${cid}')" style="font-size:11px;padding:1px 6px">Edit…</button>
          </div>`
        :`<div style="display:flex;gap:4px;align-items:center">
            <select class="ei" id="ep-${b.id}" onchange="App.onRowPay(this,'${b.id}','${cid}')">
              <option value="cash"${b.payment==='cash'?' selected':''}>Cash</option>
              <option value="check"${b.payment==='check'?' selected':''}>Check</option>
              <option value="split">Split…</option>
            </select>
            <input class="ei" id="epck-${b.id}" placeholder="Ck #" value="${esc(b.checkNumber||'')}" style="width:70px;display:${b.payment==='check'?'block':'none'}">
          </div>`;
      return`<tr>
        <td class="rn">${num}</td>
        <td class="mo">${esc(b.bolNumber)||'—'}</td>
        <td><input class="ei" id="ec-${b.id}" value="${esc(b.customerName||'')}" placeholder="Last, First"></td>
        <td><input class="ei" id="ed-${b.id}" value="${esc(b.destination||'')}" placeholder="Destination" style="color:var(--t2)"></td>
        <td><select class="ei" id="es-${b.id}"><option value="">—</option>${szOpts}</select></td>
        <td class="nu">${b.cost?fm(b.cost):'—'}</td>
        <td>${payCell}</td>
        <td class="nu">${nv?fm(nv):'—'}</td>
        <td class="ct"><button class="bsav" onclick="App.saveBox('${cid}','${b.id}')" title="Save">✓</button><button class="bdel" onclick="App.delBox('${cid}','${b.id}')">×</button></td>
      </tr>`;
    }
    return`<tr><td class="rn">${num}</td><td class="mo">${esc(b.bolNumber)||'—'}</td><td>${esc(b.customerName)||'—'}</td><td style="color:var(--t2);font-size:13px">${esc(b.destination)||'—'}</td><td><span class="chip ${chip}">${lbl}</span></td><td class="nu">${b.cost?fm(b.cost):'—'}</td><td>${pay}</td><td class="nu">${nv?fm(nv):'—'}</td><td class="ct"><button class="bdel" onclick="App.delBox('${cid}','${b.id}')">×</button></td></tr>`;
  },

  addRow(){
    const opts=Object.entries(SZ).map(([k,v])=>`<option value="${k}">${v}${SZDIM[k]?' ('+SZDIM[k]+')':''}</option>`).join('');
    return`<tr class="ar" id="ar"><td></td><td><input id="ab-bol" class="mi" placeholder="BOL Number"></td><td><input id="ab-nm" placeholder="Last, First"></td><td><input id="ab-dst" placeholder="Destination"></td><td><select id="ab-sz" onchange="App.onSz(this)"><option value="">Size…</option>${opts}</select></td><td><input id="ab-cost" type="number" placeholder="—" min="0" step="0.01" style="text-align:right;background:var(--bg);color:var(--t2);cursor:default" readonly tabindex="-1"></td><td><select id="ab-pay" onchange="App.onPay(this)"><option value="">Pay…</option><option value="cash">Cash</option><option value="check">Check</option><option value="split">Split…</option></select><input id="ab-chk" class="mi" placeholder="Check #"></td><td><input id="ab-net" type="number" placeholder="auto" min="0" step="1" style="text-align:right"></td><td class="ct"><button class="btn bp bxs" onclick="App.addBox()">Add</button></td></tr>`;
  },

  onSz(sel){
    const cost=document.getElementById('ab-cost');
    const net=document.getElementById('ab-net');
    if(!cost)return;
    const p=sel.value?(this.data.pricing[sel.value]||0):0;
    cost.value=p||'';
    if(net)net.value=p||'';
  },
  onPay(sel){
    const e=document.getElementById('ab-chk');if(!e)return;
    e.style.display=sel.value==='check'?'block':'none';
    if(sel.value==='check')setTimeout(()=>e.focus(),30);
    if(sel.value==='split'){this.showSplitModal(sel);}
  },

  onRowPay(sel,bid,cid){
    const ckInput=document.getElementById('epck-'+bid);
    if(sel.value==='check'){if(ckInput)ckInput.style.display='block';}
    else if(sel.value==='split'){sel.value='cash';this.showSplitModalForBox(bid,cid);}
    else{if(ckInput)ckInput.style.display='none';}
  },

  showSplitModalForBox(bid,cid){
    const c=this.data.collections.find(x=>x.id===cid);
    const b=c?.boxes.find(x=>x.id===bid);
    const ca=b?.cashAmount||0,ck=b?.checkAmount||0,ckn=b?.checkNumber||'';
    document.getElementById('mr').innerHTML=`<div class="mb" onclick="App.cm(event)"><div class="md" onclick="event.stopPropagation()" style="max-width:380px">
      <div class="mh"><div class="mt">Split Payment</div><button class="mc" onclick="App.cm()">×</button></div>
      <div class="mbody">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div class="fg"><label>Cash Amount ($)</label><input id="sp-cash" type="number" min="0" step="1" value="${ca||''}" placeholder="0" style="text-align:right"></div>
          <div class="fg"><label>Check Amount ($)</label><input id="sp-chk" type="number" min="0" step="1" value="${ck||''}" placeholder="0" style="text-align:right"></div>
        </div>
        <div class="fg" style="margin-bottom:16px"><label>Check Number</label><input id="sp-cknum" placeholder="Check #" value="${esc(ckn)}"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn bo" onclick="App.cm()">Cancel</button>
          <button class="btn bp" onclick="App.confirmSplitForBox('${bid}','${cid}')">Confirm Split</button>
        </div>
      </div>
    </div></div>`;
    setTimeout(()=>document.getElementById('sp-cash')?.focus(),40);
  },

  confirmSplitForBox(bid,cid){
    const ca=parseFloat(document.getElementById('sp-cash')?.value)||0;
    const ck=parseFloat(document.getElementById('sp-chk')?.value)||0;
    const cknum=(document.getElementById('sp-cknum')?.value||'').trim();
    if(!cknum){alert('Check number is required.');return;}
    const c=this.data.collections.find(x=>x.id===cid);
    const b=c?.boxes.find(x=>x.id===bid);
    if(b){b.payment='split';b.cashAmount=ca;b.checkAmount=ck;b.checkNumber=cknum;this.save();this.render();}
    this.cm();toast(`Split updated: $${ca} cash + Ck#${cknum} $${ck}`);
  },

  showSplitModal(sel){
    const net=parseFloat(document.getElementById('ab-net')?.value)||0;
    document.getElementById('mr').innerHTML=`<div class="mb" onclick="App.cm(event)"><div class="md" onclick="event.stopPropagation()" style="max-width:380px">
      <div class="mh"><div class="mt">Split Payment</div><button class="mc" onclick="App.cm()">×</button></div>
      <div class="mbody">
        <p style="font-size:12px;color:var(--t3);margin-bottom:14px">Enter the cash and check portions. Amounts should add up to the net total${net?` ($${net})`:''}.
        </p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div class="fg"><label>Cash Amount ($)</label><input id="sp-cash" type="number" min="0" step="1" placeholder="0" style="text-align:right"></div>
          <div class="fg"><label>Check Amount ($)</label><input id="sp-chk" type="number" min="0" step="1" placeholder="0" style="text-align:right"></div>
        </div>
        <div class="fg" style="margin-bottom:16px"><label>Check Number</label><input id="sp-cknum" placeholder="Check #"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn bo" onclick="App.cm()">Cancel</button>
          <button class="btn bp" onclick="App.confirmSplit()">Confirm Split</button>
        </div>
      </div>
    </div></div>`;
    setTimeout(()=>document.getElementById('sp-cash')?.focus(),40);
  },

  confirmSplit(){
    const ca=parseFloat(document.getElementById('sp-cash')?.value)||0;
    const ck=parseFloat(document.getElementById('sp-chk')?.value)||0;
    const cknum=(document.getElementById('sp-cknum')?.value||'').trim();
    if(!ca&&!ck){alert('Enter at least one amount.');return;}
    if(!cknum){alert('Check number is required for split payment.');return;}
    this.splitCash=ca;this.splitCheck=ck;this.splitCheckNum=cknum;this.splitPending=true;
    const sel=document.getElementById('ab-pay');
    if(sel)sel.value='split';
    const lbl=document.getElementById('ab-split-lbl');
    if(lbl)lbl.textContent=`$${ca} cash / Ck#${cknum} $${ck}`;
    this.cm();
    toast(`Split set: $${ca} cash + Ck#${cknum} $${ck}`);
  },

  addBox(){
    const ac=this.ac();if(!ac)return;
    const g=id=>document.getElementById(id)?.value??'';
    const cost=parseFloat(g('ab-cost'))||0;
    const nr=parseFloat(g('ab-net'));
    const pay=g('ab-pay');
    if(pay==='split'&&!this.splitPending){toast('Use Split… to set cash/check amounts first.');return;}
    const net=isNaN(nr)?cost:nr;
    const box={id:uid(),bolNumber:g('ab-bol').trim(),customerName:g('ab-nm').trim(),destination:g('ab-dst').trim(),size:g('ab-sz'),cost,payment:pay,checkNumber:pay==='check'?g('ab-chk').trim():pay==='split'?this.splitCheckNum:'',net};
    if(pay==='split'){box.cashAmount=this.splitCash;box.checkAmount=this.splitCheck;}
    this.splitPending=false;this.splitCash=0;this.splitCheck=0;this.splitCheckNum='';
    const commit=()=>{ac.boxes.push(box);this.save();this.render();setTimeout(()=>document.getElementById('ab-bol')?.focus(),40);};
    const payTotal=pay==='split'?(box.cashAmount+box.checkAmount):net;
    if(cost&&Math.abs(payTotal-cost)>0.01)this.showPayMismatch(cost,payTotal,commit);
    else commit();
  },

  saveBox(cid,bid){
    const c=this.data.collections.find(x=>x.id===cid);if(!c)return;
    const b=c.boxes.find(x=>x.id===bid);if(!b)return;
    const nm=document.getElementById('ec-'+bid);
    const dst=document.getElementById('ed-'+bid);
    const sz=document.getElementById('es-'+bid);
    const pay=document.getElementById('ep-'+bid);
    const cknum=document.getElementById('epck-'+bid);
    if(nm)b.customerName=nm.value.trim();
    if(dst)b.destination=dst.value.trim();
    if(sz&&sz.value){
      b.size=sz.value;
      const p=this.data.pricing[sz.value]||0;
      if(p){b.cost=p;if(b.net)b.net=p;}
    }
    if(pay&&pay.value&&pay.value!=='split'){
      b.payment=pay.value;
      if(pay.value==='check')b.checkNumber=(cknum?.value||'').trim();
      else{b.checkNumber='';b.cashAmount=undefined;b.checkAmount=undefined;}
    }
    const net=b.net||b.cost;
    const payTotal=b.payment==='split'?((b.cashAmount||0)+(b.checkAmount||0)):net;
    const commit=()=>{this.save();this.render();toast('Row updated.');};
    if(b.cost&&Math.abs(payTotal-b.cost)>0.01)this.showPayMismatch(b.cost,payTotal,commit);
    else commit();
  },

  showPayMismatch(expected,actual,onConfirm){
    document.getElementById('mr').innerHTML=`<div class="mb" onclick="App.cm(event)"><div class="md" onclick="event.stopPropagation()" style="max-width:400px;border-top:4px solid #c0392b">
      <div class="mh" style="background:#c0392b"><div class="mt">⚠ Payment Amount Mismatch</div><button class="mc" onclick="App.cm()">×</button></div>
      <div class="mbody">
        <p style="font-size:15px;font-weight:700;color:#c0392b;text-align:center;margin-bottom:10px">OVERRIDE REQUIRED</p>
        <p style="font-size:13px;text-align:center;margin-bottom:6px">Standard cost for this box size:</p>
        <p style="font-size:22px;font-weight:700;text-align:center;color:#0F1B35;margin-bottom:6px">${fm(expected)}</p>
        <p style="font-size:13px;text-align:center;margin-bottom:6px">Payment amount entered:</p>
        <p style="font-size:22px;font-weight:700;text-align:center;color:#c0392b;margin-bottom:16px">${fm(actual)}</p>
        <p style="font-size:12px;color:var(--t3);text-align:center;margin-bottom:18px">Confirm to save with the override amount, or cancel to go back and correct it.</p>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn bo" style="min-width:100px" onclick="App.cm()">Cancel</button>
          <button class="btn" style="min-width:140px;background:#c0392b;color:#fff;font-weight:700" onclick="App._payMismatchConfirm()">Confirm Override</button>
        </div>
      </div>
    </div></div>`;
    this._pendingPayCommit=onConfirm;
  },

  // ── History ───────────────────────────────────────────────────────────────
  rHistory(){
    const el=document.getElementById('view-history');
    const done=this.done();
    if(!done.length){
      el.innerHTML=`<div style="text-align:center;padding:60px;color:var(--t3)"><h3 style="font-size:16px;margin-bottom:8px;color:var(--t2)">No completed collections yet</h3><p>Submit your first collection from the Active tab on pickup day.</p></div>`;
      return;
    }
    el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><h2 style="font-size:16px;font-weight:600">${done.length} Completed Collections</h2></div><div style="display:flex;flex-direction:column;gap:10px">${done.map(c=>this.hCard(c)).join('')}</div>`;
  },

  hCard(c){
    const tot=collVal(c);
    const op=this.openHist.has(c.id);
    const srt=this.histSort[c.id]||{col:null,dir:1};
    const si=(col)=>srt.col===col?(srt.dir===1?' ▲':' ▼'):'';
    const th=(col,lbl,align='')=>`<th style="cursor:pointer;user-select:none${align?';text-align:'+align:''}" onclick="App.sortHist('${c.id}','${col}')">${lbl}${si(col)}</th>`;
    const sorted=c.boxes.slice().sort((a,b)=>{
      if(!srt.col)return 0;
      let av,bv;
      if(srt.col==='bol'){av=a.bolNumber||'';bv=b.bolNumber||'';}
      else if(srt.col==='customer'){av=a.customerName||'';bv=b.customerName||'';}
      else if(srt.col==='destination'){av=a.destination||'';bv=b.destination||'';}
      else if(srt.col==='size'){av=a.size||'';bv=b.size||'';}
      else if(srt.col==='cost'){av=parseFloat(a.cost)||0;bv=parseFloat(b.cost)||0;return(av-bv)*srt.dir;}
      else if(srt.col==='payment'){av=(a.payment||'')+(a.checkNumber||'');bv=(b.payment||'')+(b.checkNumber||'');}
      else if(srt.col==='net'){av=parseFloat(a.net||a.cost)||0;bv=parseFloat(b.net||b.cost)||0;return(av-bv)*srt.dir;}
      return av.localeCompare(bv)*srt.dir;
    });
    const editing=this.editHistIds.has(c.id);
    let rows;
    if(editing){
      rows=sorted.map((b,i)=>this.bRow(b,i+1,c.id,true)).join('');
    }else{
      const groups=this._ckGroups(sorted);
      let rn=0;
      rows=groups.map(g=>{
        if(g.type==='single'){rn++;return this.bRow(g.box,rn,c.id,false);}
        const start=rn+1;rn+=g.boxes.length;
        const numLbl=start===rn?String(start):`${start}–${rn}`;
        const custs=[...new Set(g.boxes.map(b=>b.customerName||'').filter(Boolean))];
        const custLbl=custs.length===1?esc(custs[0]):custs.length>1?`${custs.length} customers`:'—';
        const totalNet=g.boxes.reduce((s,b)=>s+(parseFloat(b.net||b.cost)||0),0);
        const subs=g.boxes.map(b=>{
          const chip=SZCHIP[b.size]||'';const lbl=SZ[b.size]||b.size||'—';const nv=b.net||b.cost;
          return`<tr class="ck-grp-sub"><td class="rn"></td><td class="mo" style="padding-left:18px">${esc(b.bolNumber)||'—'}</td><td>${esc(b.customerName)||'—'}</td><td style="color:var(--t2);font-size:13px">${esc(b.destination)||'—'}</td><td><span class="chip ${chip}">${lbl}</span></td><td class="nu">${b.cost?fm(b.cost):'—'}</td><td></td><td class="nu">${nv?fm(nv):'—'}</td><td class="ct"><button class="bdel" onclick="App.delBox('${c.id}','${b.id}')">×</button></td></tr>`;
        }).join('');
        return`<tr class="ck-grp-hd"><td class="rn" style="font-size:11px;color:var(--chk)">${numLbl}</td><td class="mo"><span class="pc pck">Ck #${esc(g.checkNumber)}</span></td><td style="font-size:12px;color:var(--t2)">${custLbl}</td><td></td><td style="font-size:12px;color:var(--t2)">${g.boxes.length} boxes</td><td class="nu" style="color:var(--chk);font-weight:600">${fm(g.total)}</td><td><span style="font-size:11px;color:var(--chk)">Check</span></td><td class="nu" style="color:var(--chk)">${totalNet?fm(totalNet):'—'}</td><td></td></tr>${subs}`;
      }).join('');
    }
    const editBtn=editing
      ?`<button class="btn bsm" onclick="App.toggleHistEdit('${c.id}')" style="background:#22c55e;color:#fff;border-color:#22c55e">✓ Done Editing</button>`
      :`<button class="btn bo bsm" onclick="App.toggleHistEdit('${c.id}')" style="color:#6366f1;border-color:#6366f1">✏ Edit Entries</button>`;
    const startD=c.startDate&&c.startDate!==c.collectionDate?`<span style="font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em">Started</span> <span style="font-weight:600;color:var(--t2)">${fd(c.startDate)}</span> <span style="color:var(--t3);margin:0 4px">→</span>`:'';
    return`<div class="hc${editing?' hc-editing':''}"><div class="hch" onclick="App.togH('${c.id}')"><div><div class="hcd">${startD}<span style="font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em">${c.startDate&&c.startDate!==c.collectionDate?'Pickup':'Pickup'}</span> ${fd(c.collectionDate)}</div><div class="hca">Branch ${esc(c.branch||'—')} · ${esc(c.agent||'—')}</div></div><div class="hcr"><div class="hctot">${fm(tot)}</div><div class="hcn">${c.boxes.length} boxes</div></div><div class="hcar${op?' op':''}">▾</div></div><div class="hcb${op?' op':''}"><div class="hcba"><button class="btn bo bsm" onclick="App.printCol('${c.id}')">🖨 Print Report</button><button class="btn bo bsm" onclick="App.saveColPdf('${c.id}')">💾 Save PDF</button><button class="btn bo bsm" onclick="App.reopenCol('${c.id}')" style="color:var(--acc);border-color:var(--acc)">↩ Re-open</button>${editBtn}</div><div class="tw"><table><thead><tr><th>#</th>${th('bol','BOL Number')}${th('customer','Customer')}${th('destination','Destination')}${th('size','Size')}${th('cost','Cost','right')}${th('payment','Payment')}${th('net','Net','right')}<th></th></tr></thead><tbody>${rows||'<tr><td colspan="9" style="text-align:center;color:var(--t3);padding:12px">No entries</td></tr>'}</tbody></table></div></div></div>`;
  },

  togH(id){if(this.openHist.has(id))this.openHist.delete(id);else this.openHist.add(id);this.rHistory();},
  toggleHistEdit(cid){
    if(this.editHistIds.has(cid)){this.editHistIds.delete(cid);toast('Done editing.');}
    else{this.editHistIds.add(cid);this.openHist.add(cid);toast('Edit mode — click ✓ on each row to save changes.');}
    this.rHistory();
  },
  sortHist(cid,col){const cur=this.histSort[cid]||{col:null,dir:1};this.histSort[cid]={col,dir:cur.col===col?cur.dir*-1:1};this.rHistory();},
  sortRpt(tbl,col){const cur=this.rptSort[tbl]||{col:null,dir:1};this.rptSort[tbl]={col,dir:cur.col===col?cur.dir*-1:1};this.rReports();},

  // ── Analytics ─────────────────────────────────────────────────────────────
  _filterDone(collections,from,to){
    return collections.filter(c=>{
      const cd=c.collectionDate||c.startDate||'';
      if(from&&cd<from)return false;
      if(to&&cd>to)return false;
      return true;
    });
  },

  _periodStats(cols){
    const boxes=cols.reduce((s,c)=>s+c.boxes.length,0);
    const value=cols.reduce((s,c)=>s+collVal(c),0);
    const avg=cols.length?value/cols.length:0;
    const cash=cols.reduce((s,c)=>s+collCash(c),0);
    const chk=cols.reduce((s,c)=>s+collChk(c),0);
    return{count:cols.length,boxes,value,avg,cash,chk};
  },

  rAnalytics(){
    const el=document.getElementById('view-analytics');
    const all=this.done();
    if(all.length<2){el.innerHTML=`<div class="ea"><h3>Not enough data yet</h3><p>Analytics appear after 2+ completed collections.</p></div>`;return;}

    const done=this.anlFrom||this.anlTo?this._filterDone(all,this.anlFrom,this.anlTo):all;
    const hasFilter=!!(this.anlFrom||this.anlTo);
    const hasCmp=!!(this.anlCmpFrom||this.anlCmpTo);
    const cmpDone=hasCmp?this._filterDone(all,this.anlCmpFrom,this.anlCmpTo):[];

    const allB=done.reduce((s,c)=>s+c.boxes.length,0);
    const allV=done.reduce((s,c)=>s+collVal(c),0);
    const avgV=done.length?allV/done.length:0;

    const mon={};
    done.forEach(c=>{
      const k=(c.collectionDate||c.startDate||'').slice(0,7);if(!k)return;
      if(!mon[k])mon[k]=[];
      const v=collVal(c);
      mon[k].push({boxes:c.boxes.length,value:v,date:c.collectionDate||c.startDate||''});
    });
    // Sort pickups within each month by date
    Object.values(mon).forEach(arr=>arr.sort((a,b)=>a.date.localeCompare(b.date)));
    const mKeys=Object.keys(mon).sort().slice(-18);

    const tRows=done.map((c,i)=>{
      const v=collVal(c);
      const prev=done[i+1];
      const pv=prev?collVal(prev):null;
      const pb=prev?prev.boxes.length:null;
      const dv=pv!==null?((v-pv)/pv*100).toFixed(1):null;
      const db=pb!==null?c.boxes.length-pb:null;
      const dvH=dv===null?`<span class="dna">—</span>`:parseFloat(dv)>=0?`<span class="dup">▲${dv}%</span>`:`<span class="ddn">▼${Math.abs(dv)}%</span>`;
      const dbH=db===null?`<span class="dna">—</span>`:db>=0?`<span class="dup">+${db}</span>`:`<span class="ddn">${db}</span>`;
      const ca=collCash(c),ck=collChk(c);
      return`<tr><td style="font-weight:600">${fd(c.collectionDate)}</td><td class="nu">${c.boxes.length}</td><td class="nu" style="color:var(--cash)">${fm(v)}</td><td class="nu">${dvH}</td><td class="nu">${dbH}</td><td class="nu" style="color:var(--cash);font-size:12px">${fmi(ca)}</td><td class="nu" style="color:var(--chk);font-size:12px">${fmi(ck)}</td></tr>`;
    }).join('');

    // Top 10 by boxes
    const custMap={};
    done.forEach(c=>c.boxes.forEach(b=>{
      const nm=(b.customerName||'').trim();if(!nm)return;
      if(!custMap[nm])custMap[nm]={boxes:0,value:0};
      custMap[nm].boxes++;
      custMap[nm].value+=parseFloat(b.cost)||0;
    }));
    const top10=Object.entries(custMap).sort((a,b)=>b[1].boxes-a[1].boxes).slice(0,10);
    const t10rows=top10.map(([nm,d],i)=>`<tr><td class="rn">${i+1}</td><td style="font-weight:600">${esc(nm)}</td><td class="nu">${d.boxes}</td><td class="nu" style="color:var(--cash)">${d.value?fm(d.value):'—'}</td></tr>`).join('');

    // Comparison stats
    const pA=this._periodStats(done);
    const pB=hasCmp?this._periodStats(cmpDone):null;
    const cmpHtml=pB?`
    <div class="anl-cmp">
      <div class="anl-cmp-hd">Period Comparison</div>
      <div class="anl-cmp-grid">
        <div class="anl-cmp-col">
          <div class="anl-cmp-lbl">Period A${this.anlFrom||this.anlTo?` (${this.anlFrom||'start'} → ${this.anlTo||'now'})`:' (All)'}</div>

  drawChart(mon,keys){
    const canvas=document.getElementById('ch');if(!canvas)return;
    const dpr=window.devicePixelRatio||1;
    const W=canvas.parentElement.clientWidth-48;
    const H=200;
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    if(!keys.length)return;

    // Each month is an array of pickups; find the single max pickup value for y-scale
    const allPickupVals=keys.flatMap(k=>(mon[k]||[]).map(p=>this.cmode==='value'?p.value:p.boxes));
    const maxV=Math.max(...allPickupVals,1);

    const PL=52,PR=16,PT=16,PB=36;
    const cW=W-PL-PR,cH=H-PT-PB;
    const step=cW/keys.length;
    const GAP=3; // gap between pickup bars within a month

    // Two-tone colors: 1st pickup darker, 2nd lighter
    const COLORS=[['#D44E10','#F08050'],['#E8832A','#F5B580']];

    // grid
    ctx.strokeStyle='#E2E6EE';ctx.lineWidth=1;
    ctx.fillStyle='#9199AB';ctx.font='10px Segoe UI,system-ui,sans-serif';ctx.textAlign='right';
    for(let i=0;i<=4;i++){
      const y=PT+cH-(i/4)*cH;
      ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
      const lbl=this.cmode==='value'?'$'+((maxV*i/4)/1000).toFixed(0)+'k':String(Math.round(maxV*i/4));
      ctx.fillText(lbl,PL-4,y+3.5);
    }

    keys.forEach((k,i)=>{
      const pickups=mon[k]||[];
      const n=Math.min(pickups.length,2);
      if(!n)return;
      const slotX=PL+i*step;
      const totalGaps=GAP*(n-1)+8; // outer padding 4px each side
      const bW=Math.max(4,Math.floor((step-totalGaps)/n));
      const usedW=bW*n+GAP*(n-1);
      const startX=slotX+(step-usedW)/2;

      pickups.slice(0,2).forEach((p,pi)=>{
        const v=this.cmode==='value'?p.value:p.boxes;
        const bH=(v/maxV)*cH;
        const x=startX+pi*(bW+GAP);
        const y=PT+cH-bH;
        const [c0,c1]=COLORS[pi];
        const g=ctx.createLinearGradient(0,y,0,y+bH);
        g.addColorStop(0,c0);g.addColorStop(1,c1);
        ctx.fillStyle=g;
        if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,bW,Math.max(bH,1),3);ctx.fill();}
        else{ctx.fillRect(x,y,bW,Math.max(bH,1));}
        // value label inside bar
        if(bH>16){
          ctx.fillStyle='#fff';ctx.font='bold 9px Segoe UI,system-ui,sans-serif';ctx.textAlign='center';
          const t=this.cmode==='value'?'$'+Math.round(v/100)/10+'k':String(v);
          ctx.fillText(t,x+bW/2,y+11);
        }
      });

      // Month label centered under the group
      ctx.fillStyle='#9199AB';ctx.font='10px Segoe UI,system-ui,sans-serif';ctx.textAlign='center';
      ctx.fillText(mlbl(k),slotX+step/2,H-PB+14);

      // Month total above bars (small, muted)
      const total=pickups.slice(0,2).reduce((s,p)=>s+(this.cmode==='value'?p.value:p.boxes),0);
      const topY=PT+cH-(Math.max(...pickups.slice(0,2).map(p=>this.cmode==='value'?p.value:p.boxes))/maxV)*cH;
      ctx.fillStyle='#9199AB';ctx.font='9px Segoe UI,system-ui,sans-serif';ctx.textAlign='center';
      const tlbl=this.cmode==='value'?'$'+Math.round(total/100)/10+'k':String(total);
      ctx.fillText(tlbl,slotX+step/2,topY-4);
    });
  },

  _ckGroups(boxes){
    const ckMap={};
    boxes.forEach(b=>{if(b.payment==='check'&&b.checkNumber){if(!ckMap[b.checkNumber])ckMap[b.checkNumber]=[];ckMap[b.checkNumber].push(b);}});
    const seen=new Set();
    const result=[];
    boxes.forEach(b=>{
      if(b.payment==='check'&&b.checkNumber){
        const k=b.checkNumber;
        if(seen.has(k))return;
        seen.add(k);
        const bs=ckMap[k];
        if(bs.length===1){result.push({type:'single',box:b});}
        else{const total=bs.reduce((s,x)=>s+(parseFloat(x.cost)||0),0);result.push({type:'ck',checkNumber:k,boxes:bs,total});}
      }else{result.push({type:'single',box:b});}
    });
    return result;
  },

        const loc2s=[c.city,c.state].filter(Boolean).join(', ');

    el.innerHTML=`${resHd}${tableHtml}${contactsHtml}${!hasQ?`<div class="ea"><h3>Enter a name or date range to search</h3><p>Matches across all completed collections and the active collection.</p></div>`:''}`;

  doSearch(name,bolq,chkq,from,to,pickup){
    const q=(name||'').trim().toLowerCase();
    const bq=(bolq||'').trim().replace(/\D/g,'');
    const cq=(chkq||'').trim();
    const results=[];
    this.data.collections.forEach(coll=>{
      const cd=coll.collectionDate||coll.startDate||'';
      if(pickup&&cd!==pickup)return;
      if(!pickup&&from&&cd&&cd<from)return;
      if(!pickup&&to&&cd&&cd>to)return;
      coll.boxes.forEach(box=>{
        if(q){
          const nm=(box.customerName||'').toLowerCase();
          const parts=nm.split(',').map(s=>s.trim());
          if(!nm.includes(q)&&!parts.some(p=>p.startsWith(q)))return;
        }
        if(bq){
          const bnum=(box.bolNumber||'').replace(/\D/g,'');
          if(!bnum.includes(bq))return;
        }
        if(cq){
          const ckn=(box.checkNumber||'').trim();
          if(!ckn.includes(cq))return;
        }
        results.push({box,coll});
      });
    });
    results.sort((a,b)=>(b.coll.collectionDate||b.coll.startDate||'').localeCompare(a.coll.collectionDate||a.coll.startDate||''));
    return results;
  },

  searchContacts(q){
    if(!q)return[];
    const lq=q.toLowerCase();
    return(this.data.contacts||[]).filter(c=>{
      return(c.displayName||'').toLowerCase().includes(lq)||
             (c.phone1||'').replace(/\D/g,'').includes(lq.replace(/\D/g,''))||
             (c.city||'').toLowerCase().includes(lq)||
             (c.note||'').toLowerCase().includes(lq);
    });
  },

  rContacts(){
    const el=document.getElementById('view-contacts');
    const contacts=this.data.contacts||[];
    const q=this.contactSearch.toLowerCase().trim();
    const imp=this.data.contactsImportedAt;
    const qd=q.replace(/\D/g,'');
    const filtered=q?contacts.filter(c=>{
      return(c.displayName||'').toLowerCase().includes(q)||
             (c.firstName||'').toLowerCase().includes(q)||
             (c.lastName||'').toLowerCase().includes(q)||
             (qd&&(c.phone1||'').replace(/\D/g,'').includes(qd))||
             (qd&&(c.phone2||'').replace(/\D/g,'').includes(qd))||
             (c.address||'').toLowerCase().includes(q)||
             (c.city||'').toLowerCase().includes(q)||
             (c.state||'').toLowerCase().includes(q)||
             (c.zip||'').includes(q)||
             (c.address2||'').toLowerCase().includes(q)||
             (c.city2||'').toLowerCase().includes(q)||
             (c.state2||'').toLowerCase().includes(q)||
             (c.zip2||'').includes(q)||
             (c.email||'').toLowerCase().includes(q)||
             (c.note||'').toLowerCase().includes(q);
    }):contacts;
    const sorted=filtered.slice().sort((a,b)=>(a.displayName||'').localeCompare(b.displayName||''));
    const meta=contacts.length?`${filtered.length}${q?' of '+contacts.length:''} contact${contacts.length!==1?'s':''}${imp?' · Imported '+fd(imp.slice(0,10)):''}` :'';
    const emptyBody=contacts.length===0
      ?`<div class="ea"><h3>No contacts imported</h3><p>Import your LBC Contacts CSV file to get started.</p></div>`
      :(q&&!filtered.length?`<div class="ea"><h3>No contacts match "${esc(q)}"</h3></div>`:'');
    // Build shipment history map once for all cards (lastName → [{box,coll}])
    this._shipHistMap=new Map();
    this.data.collections.forEach(coll=>{
      coll.boxes.forEach(box=>{
        const k=(box.customerName||'').split(',')[0].trim().toLowerCase();
        if(k.length<2)return;
        if(!this._shipHistMap.has(k))this._shipHistMap.set(k,[]);

            <label>City</label><input id="ce-cy2" value="${esc(c.city2||'')}">
            <label>State</label><input id="ce-st2" value="${esc(c.state2||'')}">

  saveNewContact(){

    const ln=g('nc-ln').trim();

      id:uid(),

      source:'manual',importedAt:tod()

    c.address=g('ce-ad');c.city=g('ce-cy');c.state=g('ce-st');c.zip=g('ce-zp');

    const inv=this.boxInv();
    inv.log=inv.log.filter(e=>e.id!==id);
    this.save();
    this.rBoxInventory();
  },

  exportBoxCSV(){
    const inv=this.boxInv();
    const totalOut=inv.log.reduce((s,e)=>s+e.qty,0);
    const onHand=inv.starting-totalOut;
    const rows=[['Date','Note / Recipient','Qty Out']];
    inv.log.forEach(e=>rows.push([e.date,e.note||'',e.qty]));
    rows.push([]);
    rows.push(['Starting Stock','Total Out','On Hand']);
    rows.push([inv.starting,totalOut,onHand]);
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    const b=new Blob([csv],{type:'text/csv'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');
    a.href=u;a.download=`box-inventory-${tod()}.csv`;a.click();
    URL.revokeObjectURL(u);
    toast('CSV downloaded.');
  },
