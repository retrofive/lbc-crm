  rReports(){
    const el=document.getElementById('view-reports');
    const s=this.data.settings||{};
    const allDone=this.done();
    const from=this.rptFrom,to=this.rptTo;
    const filtered=allDone.filter(c=>{
      const d=c.collectionDate||c.startDate||'';
      if(from&&d<from)return false;
      if(to&&d>to)return false;
      return true;
    });

    const fmDate=d=>d?fd(d):'—';
    const rangeLabel=(from||to)?(from&&to?`${fmDate(from)} – ${fmDate(to)}`:from?`From ${fmDate(from)}`:` Through ${fmDate(to)}`):'All Time';

    // KPI calculation
    const totalBoxes=filtered.reduce((s,c)=>s+c.boxes.length,0);
    const totalValue=filtered.reduce((s,c)=>s+collVal(c),0);
    const totalCash=filtered.reduce((s,c)=>s+collCash(c),0);
    const totalChk=filtered.reduce((s,c)=>s+collChk(c),0);
    const avgBoxes=filtered.length?totalBoxes/filtered.length:0;
    const avgValue=filtered.length?totalValue/filtered.length:0;

    // Monthly breakdown
    const monMap={};
    filtered.forEach(c=>{
      const k=(c.collectionDate||c.startDate||'').slice(0,7);if(!k)return;
      if(!monMap[k])monMap[k]={boxes:0,value:0,count:0};
      monMap[k].boxes+=c.boxes.length;
      monMap[k].value+=collVal(c);
      monMap[k].count++;
    });
    const monKeys=Object.keys(monMap).sort();

    // Box size breakdown
    const sizeMap={};
    filtered.forEach(c=>c.boxes.forEach(b=>{
      const sz=b.size||'?';
      if(!sizeMap[sz])sizeMap[sz]={boxes:0,value:0};
      sizeMap[sz].boxes++;sizeMap[sz].value+=parseFloat(b.cost)||0;
    }));

    const kpiHtml=`<div class="rpt-kpis">
      <div class="rpt-kpi"><div class="val">${filtered.length}</div><div class="lbl">Collections</div></div>
      <div class="rpt-kpi"><div class="val">${totalBoxes.toLocaleString()}</div><div class="lbl">Total Boxes</div><div class="sub">${avgBoxes.toFixed(1)} avg/collection</div></div>
      <div class="rpt-kpi"><div class="val" style="color:var(--cash)">${fm(totalValue)}</div><div class="lbl">Total Value</div><div class="sub">${fm(avgValue)} avg</div></div>
      <div class="rpt-kpi"><div class="val" style="color:var(--cash)">${fm(totalCash)}</div><div class="lbl">Cash</div><div class="sub">${totalValue?Math.round(totalCash/totalValue*100):0}% of total</div></div>
      <div class="rpt-kpi"><div class="val" style="color:var(--chk)">${fm(totalChk)}</div><div class="lbl">Checks</div><div class="sub">${totalValue?Math.round(totalChk/totalValue*100):0}% of total</div></div>
    </div>`;

    // ── Sort helpers ──────────────────────────────────────────────────────────
    const _si=(tbl,col)=>{const s=this.rptSort[tbl]||{};return s.col===col?(s.dir===1?' ▲':' ▼'):'';};
    const _th=(tbl,col,lbl,cls='')=>`<th style="cursor:pointer;user-select:none${cls?';text-align:right':''}" onclick="App.sortRpt('${tbl}','${col}')">${lbl}${_si(tbl,col)}</th>`;
    const _srt=(arr,tbl,keyFn)=>{const s=this.rptSort[tbl]||{};if(!s.col)return arr.slice();return arr.slice().sort((a,b)=>{const av=keyFn(a,s.col),bv=keyFn(b,s.col);if(typeof av==='number')return(av-bv)*s.dir;return String(av).localeCompare(String(bv),undefined,{numeric:true})*s.dir;});};

    // Monthly Breakdown
    const monSorted=_srt(monKeys,'mon',(k,col)=>{
      if(col==='month')return k;
      if(col==='count')return monMap[k].count;
      if(col==='boxes')return monMap[k].boxes;
      if(col==='value')return monMap[k].value;
      if(col==='avg')return monMap[k].value/monMap[k].count;
      return k;
    });
    const monTableHtml=monKeys.length?`<table class="rpt-tbl">
      <thead><tr>${_th('mon','month','Month')}${_th('mon','count','Collections')}${_th('mon','boxes','Boxes','r')}${_th('mon','value','Total Value','r')}${_th('mon','avg','Avg Value','r')}</tr></thead>
      <tbody>${monSorted.map(k=>`<tr>
        <td style="font-weight:600">${mlbl(k)}</td>
        <td>${monMap[k].count}</td>
        <td class="nr">${monMap[k].boxes}</td>
        <td class="nr" style="color:var(--cash)">${fm(monMap[k].value)}</td>
        <td class="nr">${fm(monMap[k].value/monMap[k].count)}</td>
      </tr>`).join('')}</tbody>
    </table>`:'<div class="rpt-no-data">No data for selected range.</div>';

    // Box Size Breakdown
    const sizeKeys=Object.keys(sizeMap).sort();
    const sizeSorted=_srt(sizeKeys,'size',(sz,col)=>{
      if(col==='size')return SZ[sz]||sz;
      if(col==='boxes')return sizeMap[sz].boxes;
      if(col==='pct')return sizeMap[sz].boxes;
      if(col==='value')return sizeMap[sz].value;
      return sz;
    });
    const sizeTableHtml=sizeKeys.length?`<table class="rpt-tbl">
      <thead><tr>${_th('size','size','Size')}${_th('size','boxes','Boxes','r')}${_th('size','pct','% of Total','r')}${_th('size','value','Value','r')}</tr></thead>
      <tbody>${sizeSorted.map(sz=>`<tr>
        <td style="font-weight:600">${SZ[sz]||sz}</td>

        <td class="nr" style="color:var(--cash)">${sizeMap[sz].value?fm(sizeMap[sz].value):'—'}</td>
      </tr>`).join('')}</tbody>
    </table>`:'';

    // Detailed: per-collection with box rows
    const detSorted=_srt(filtered,'det',(c,col)=>{
      if(col==='date')return c.collectionDate||'';
      if(col==='branch')return(c.branch||s.branch||'')+(c.agent||s.agent||'');
      if(col==='boxes')return c.boxes.length;
      if(col==='cash')return collCash(c);
      if(col==='checks')return collChk(c);
      if(col==='total')return collVal(c);
      return c.collectionDate||'';

    const detailHtml=filtered.length?`<table class="rpt-tbl">
      <thead><tr>${_th('det','date','Date')}${_th('det','branch','Branch / Agent')}${_th('det','boxes','Boxes','r')}${_th('det','cash','Cash','r')}${_th('det','checks','Checks','r')}${_th('det','total','Total','r')}</tr></thead>
      <tbody>${detSorted.map(c=>{
        const cv=collVal(c);
        const cc=collCash(c);
        const ck=collChk(c);
        const boxRows=c.boxes.map(b=>`<tr class="rpt-box-row">
          <td style="padding-left:28px">${b.bolNumber||'—'}</td>
          <td>${esc(b.customerName||'—')}</td>
          <td class="nr">${SZ[b.size]||b.size||'—'}</td>
          <td class="nr" style="color:var(--cash)">${b.payment==='cash'||b.payment==='split'?fm(b.payment==='split'?(parseFloat(b.cashAmount)||0):(parseFloat(b.cost)||0)):'—'}</td>
          <td class="nr" style="color:var(--chk)">${b.payment==='check'||b.payment==='split'?`${b.checkNumber?'Ck #'+esc(b.checkNumber):''} ${fm(b.payment==='split'?(parseFloat(b.checkAmount)||0):(parseFloat(b.cost)||0))}`:'—'}</td>
          <td class="nr">${b.cost?fm(parseFloat(b.cost)):'—'}</td>

        return`<tr class="rpt-coll-hd">
          <td>${fmDate(c.collectionDate)}</td>
          <td>${esc(c.branch||s.branch||'—')}${c.agent||s.agent?` · ${esc(c.agent||s.agent||'')}`:''}</td>
          <td class="nr">${c.boxes.length}</td>

          <td class="nr" style="color:var(--chk)">${fm(ck)}</td>
          <td class="nr" style="color:var(--cash);font-weight:700">${fm(cv)}</td>
        </tr>${boxRows}`;
      }).join('')}</tbody>
    </table>`:'<div class="rpt-no-data">No collections in selected range.</div>';

    // ── Checks report data ───────────────────────────────────────────────────
    const ckRowsRaw=[];
    filtered.forEach(c=>c.boxes.forEach(b=>{
      if(b.payment==='check'&&b.checkNumber)ckRowsRaw.push({date:c.collectionDate,bol:b.bolNumber||'—',customer:b.customerName||'—',num:b.checkNumber,amount:parseFloat(b.cost)||0});
      else if(b.payment==='split'&&b.checkNumber)ckRowsRaw.push({date:c.collectionDate,bol:b.bolNumber||'—',customer:b.customerName||'—',num:b.checkNumber,amount:parseFloat(b.checkAmount)||0});
    }));
    const ckSummary={};
    ckRowsRaw.forEach(r=>{if(!ckSummary[r.num])ckSummary[r.num]={total:0,count:0};ckSummary[r.num].total+=r.amount;ckSummary[r.num].count++;});
    const ckTotal=ckRowsRaw.reduce((s,r)=>s+r.amount,0);

    const ckRows=_srt(ckRowsRaw,'ck',(r,col)=>{
      if(col==='date')return r.date||'';
      if(col==='bol')return r.bol;
      if(col==='customer')return r.customer;
      if(col==='num')return r.num;
      if(col==='amount')return r.amount;
      return r.num;
    });
    // Default check entries sort: by check number if no sort active
    const ckRowsDisplay=(this.rptSort['ck']&&this.rptSort['ck'].col)?ckRows:ckRowsRaw.slice().sort((a,b)=>a.num.localeCompare(b.num,undefined,{numeric:true}));

    const ckSumKeys=_srt(Object.keys(ckSummary),'cks',(num,col)=>{
      if(col==='num')return num;
      if(col==='count')return ckSummary[num].count;
      if(col==='total')return ckSummary[num].total;
      return num;
    });
    const ckSumKeysDisplay=(this.rptSort['cks']&&this.rptSort['cks'].col)?ckSumKeys:Object.keys(ckSummary).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));

    const isOverview=this.rptType==='overview';
    const isChecks=this.rptType==='checks';

    // Group check entries by check number (per collection date)
    const ckGroups=[];
    const ckGroupMap={};
    ckRowsRaw.forEach(r=>{
      const k=r.date+'|'+r.num;
      if(!ckGroupMap[k]){ckGroupMap[k]={date:r.date,num:r.num,boxes:[],total:0};ckGroups.push(ckGroupMap[k]);}
      ckGroupMap[k].boxes.push(r);ckGroupMap[k].total+=r.amount;
    });
    const uniqueChecks=Object.keys(ckSummary).length;
    const checksBodyHtml=ckRowsRaw.length?`
      <div class="rpt-kpis">
        <div class="rpt-kpi"><div class="val">${ckRowsRaw.length}</div><div class="lbl">Check Boxes</div></div>
        <div class="rpt-kpi"><div class="val">${uniqueChecks}</div><div class="lbl">Unique Checks</div></div>
        <div class="rpt-kpi"><div class="val" style="color:var(--chk)">${fm(ckTotal)}</div><div class="lbl">Total Checks</div></div>
      </div>
      <div class="rpt-section">
        <div class="rpt-section-title">Check Entries</div>
        <table class="rpt-tbl"><thead><tr><th>Date</th><th>Check #</th><th>BOL Number</th><th>Customer</th><th class="nr">Amount</th></tr></thead>
        <tbody>${ckGroups.map(g=>{
          const hdr=`<tr class="ck-grp-hd" style="background:var(--chk-bg)"><td style="font-weight:600">${fmDate(g.date)}</td><td style="font-weight:700;color:var(--chk)">Ck #${esc(g.num)}</td><td style="font-size:12px;color:var(--t2)">${g.boxes.length} box${g.boxes.length!==1?'es':''}</td><td></td><td class="nr" style="font-weight:700;color:var(--chk)">${fm(g.total)}</td></tr>`;
          const subs=g.boxes.map(r=>`<tr class="ck-grp-sub"><td></td><td style="padding-left:16px;font-size:12px;color:var(--t2)">↳</td><td style="font-family:monospace;font-size:12px;padding-left:4px">${esc(r.bol)}</td><td>${esc(r.customer)}</td><td class="nr" style="color:var(--chk)">${fm(r.amount)}</td></tr>`).join('');
          return hdr+subs;
        }).join('')}</tbody></table>
      </div>
      <div class="rpt-section">
        <div class="rpt-section-title">Check Summary</div>
        <table class="rpt-tbl"><thead><tr>${_th('cks','num','Check #')}${_th('cks','count','Boxes','r')}${_th('cks','total','Total Amount','r')}</tr></thead>
        <tbody>${ckSumKeysDisplay.map(num=>`<tr><td style="font-weight:600;color:var(--chk)">Ck #${esc(num)}</td><td class="nr">${ckSummary[num].count}</td><td class="nr" style="color:var(--chk)">${fm(ckSummary[num].total)}</td></tr>`).join('')}
        <tr style="font-weight:700;border-top:2px solid #555"><td>Total</td><td class="nr">${ckRowsRaw.length} boxes · ${uniqueChecks} checks</td><td class="nr" style="color:var(--chk)">${fm(ckTotal)}</td></tr></tbody></table>
      </div>`
    :'<div class="rpt-no-data">No check payments in selected range.</div>';

    el.innerHTML=`<div class="rpt-wrap">
      <div class="rpt-toolbar">
        <div class="rpt-type-g">
          <button class="rpt-type-btn${isOverview?' on':''}" onclick="App.rptType='overview';App.rReports()">Overview</button>
          <button class="rpt-type-btn${this.rptType==='detailed'?' on':''}" onclick="App.rptType='detailed';App.rReports()">Detailed</button>
          <button class="rpt-type-btn${isChecks?' on':''}" onclick="App.rptType='checks';App.rReports()">Checks</button>
        </div>
        <div class="fgrp" style="flex:0 0 auto"><label>From</label><input type="date" value="${from}" onchange="App.rptFrom=this.value;App.rReports()"></div>
        <div class="fgrp" style="flex:0 0 auto"><label>To</label><input type="date" value="${to}" onchange="App.rptTo=this.value;App.rReports()"></div>
        ${from||to?`<button class="btn bo bsm" style="align-self:flex-end" onclick="App.rptFrom='';App.rptTo='';App.rReports()">✕ Clear</button>`:''}
        <button class="btn bo bsm" style="align-self:flex-end;margin-left:auto" onclick="App.saveReportPdf()">💾 Save PDF</button>
        <button class="btn bp bsm" style="align-self:flex-end" onclick="App.printReport()">🖨 Print</button>
      </div>
      <div class="rpt-body" id="rpt-body">
        <div class="rpt-hd">${isOverview?'Executive Overview':isChecks?'Checks Report':'Detailed Collection Report'}</div>
        <div class="rpt-sub">${esc(s.branchTitle||s.branch||'LBC Branch 602')}${s.agent?' · '+esc(s.agent):''} &nbsp;·&nbsp; ${rangeLabel}${isChecks?'':`&nbsp;·&nbsp; ${filtered.length} collection${filtered.length!==1?'s':''}`}</div>
        ${isChecks?checksBodyHtml:`
        <div class="rpt-section">
          <div class="rpt-section-title">Key Metrics</div>
          ${kpiHtml}
        </div>
        <div class="rpt-section">
          <div class="rpt-section-title">Monthly Breakdown</div>
          ${monTableHtml}
        </div>
        ${isOverview?`<div class="rpt-section">
          <div class="rpt-section-title">Box Size Breakdown</div>
          ${sizeTableHtml}
        </div>`:`<div class="rpt-section">
          <div class="rpt-section-title">Collection Detail</div>
          ${detailHtml}
        </div>`}`}
      </div>
    </div>`;
  },

    ${body.innerHTML.replace(/class="rpt-kpis"/g,'class="kpis"').replace(/class="rpt-kpi"/g,'class="kpi"').replace(/class="rpt-section-title"/g,'class="sec-title"').replace(/class="rpt-tbl"/g,'class=""').replace(/class="rpt-coll-hd"/g,'class="chd"').replace(/class="rpt-box-row"/g,'class="brow"').replace(/class="rpt-[a-z-]+"/g,'class=""').replace(/<div class="rpt-hd">.*?<\/div>/,'').replace(/<div class="rpt-sub">.*?<\/div>/,'')}
    <script>window.onload=()=>{window.print();}<\/script>
    </body></html>`);
    w.document.close();
  },

  getShipHist(contact){
    const lname=(contact.lastName||'').toLowerCase().trim();
    if(lname.length<2)return[];
    if(this._shipHistMap){
      const r=this._shipHistMap.get(lname)||[];
      return r.slice().sort((a,b)=>(b.coll.collectionDate||'').localeCompare(a.coll.collectionDate||''));
    }
    const results=[];
    this.data.collections.forEach(coll=>{
      coll.boxes.forEach(box=>{
        const custLast=(box.customerName||'').split(',')[0].trim().toLowerCase();
        if(custLast===lname)results.push({box,coll});
      });
    });
    results.sort((a,b)=>(b.coll.collectionDate||'').localeCompare(a.coll.collectionDate||''));
    return results;
  },

  async downloadUpdate(url){
    const el=document.getElementById('gear-update-status');
    // Open Save As dialog FIRST — must happen within the click gesture before any await fetch
    let fh=null;
    if(window.showSaveFilePicker){
      try{
        fh=await window.showSaveFilePicker({suggestedName:'LBC-CRM.html'});
      }catch(e){
        if(e.name==='AbortError'){if(el)el.innerHTML='<strong>Check for Updates</strong><span>Cancelled</span>';return;}
      }
    }
    if(el)el.innerHTML='<strong>Downloading…</strong><span>Fetching latest file</span>';
    try{
      const res=await fetch(url,{cache:'no-store'});
      if(!res.ok)throw new Error('HTTP '+res.status);
      const blob=await res.blob();
      if(fh){
        const w=await fh.createWritable();await w.write(blob);await w.close();
        if(el)el.innerHTML='<strong style="color:var(--ok)">Update saved!</strong><span>Reopen LBC-CRM.html to apply</span>';
        toast('Update saved — reopen LBC-CRM.html to apply.');
      }else{
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='LBC-CRM.html';
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(a.href),1000);
        if(el)el.innerHTML='<strong>Downloaded!</strong><span>Replace your LBC-CRM.html with the file in Downloads</span>';
        toast('Saved to Downloads folder.');
      }
    }catch(e){
      if(el)el.innerHTML='<strong>Download failed</strong><span>Check your connection and try again</span>';
      toast('Download failed: '+e.message);
    }
  },

  async checkUpdate(){
    const VER='https://raw.githubusercontent.com/retrofive/lbc-crm/main/version.json';
    const DL='https://raw.githubusercontent.com/retrofive/lbc-crm/main/LBC-CRM.html';
    const el=document.getElementById('gear-update-status');
    if(el)el.innerHTML='<strong>Checking…</strong><span>Contacting GitHub</span>';
    const cmpVer=(a,b)=>{const[am,an]=(a+'').split('.').map(Number);const[bm,bn]=(b+'').split('.').map(Number);if(am!==bm)return am-bm;return(an||0)-(bn||0);};
    try{
      const res=await fetch(VER+'?_='+Date.now());
      if(!res.ok)throw new Error('HTTP '+res.status);
      const data=await res.json();
      const remote=data.version;
      if(!remote)throw new Error('Version not found');
      const local=(document.querySelector('.ver')||{}).textContent.replace('v','').trim();
      if(cmpVer(remote,local)>0){
        if(el)el.innerHTML=`<strong style="color:var(--ok)">v${remote} available!</strong><span><button onclick="App.downloadUpdate('${DL}')" style="background:none;border:none;padding:0;color:var(--acc);text-decoration:underline;cursor:pointer;font-size:inherit">Download &amp; replace file</button></span>`;
        toast(`Update available: v${remote}`);
      }else{
        if(el)el.innerHTML=`<strong>Up to date</strong><span>v${local} is the latest</span>`;
        toast('Already on the latest version.');
      }
    }catch(e){
      if(el)el.innerHTML='<strong>Check for Updates</strong><span>Could not reach GitHub — try again</span>';
      toast('Update check failed: '+e.message);
    }
  },

  clearAllContacts(){

    if(!confirm(`CONFIRM: Permanently delete all ${n} contacts?\n\nThis cannot be undone.`))return;
    this.data.contacts=[];
    delete this.data.contactsImportedAt;
    this.save();this.closeGear();this.openContacts=new Set();
    if(this.view==='contacts')this.rContacts();
    toast(`${n} contacts cleared.`);
  },

  async _odsXml(file){
    const u8=new Uint8Array(await file.arrayBuffer());
    const r4=o=>(u8[o]|(u8[o+1]<<8)|(u8[o+2]<<16)|(u8[o+3]<<24))>>>0;
    const r2=o=>u8[o]|(u8[o+1]<<8);
    let eocd=-1;
    for(let i=u8.length-22;i>=Math.max(0,u8.length-65557);i--){
      if(u8[i]===0x50&&u8[i+1]===0x4b&&u8[i+2]===0x05&&u8[i+3]===0x06){eocd=i;break;}
    }
    if(eocd<0)throw new Error('Not a valid ZIP/ODS file');
    const cdOff=r4(eocd+16),cdSz=r4(eocd+12);
    const td=new TextDecoder();
    let pos=cdOff;
    while(pos<cdOff+cdSz){
      if(u8[pos]!==0x50||u8[pos+1]!==0x4b||u8[pos+2]!==0x01||u8[pos+3]!==0x02)break;
      const comp=r2(pos+10),cSz=r4(pos+20),nLen=r2(pos+28),xLen=r2(pos+30),cmLen=r2(pos+32),lOff=r4(pos+42);
      const name=td.decode(u8.subarray(pos+46,pos+46+nLen));
      if(name==='content.xml'){
        const lnLen=r2(lOff+26),lxLen=r2(lOff+28),dOff=lOff+30+lnLen+lxLen;
        const data=u8.subarray(dOff,dOff+cSz);
        if(comp===0)return new TextDecoder().decode(data);
        if(comp===8){
          const ds=new DecompressionStream('deflate-raw');
          const w=ds.writable.getWriter();w.write(data);w.close();
          const chunks=[];const rd=ds.readable.getReader();
          for(;;){const{done,value}=await rd.read();if(done)break;chunks.push(value);}
          const tot=chunks.reduce((s,c)=>s+c.length,0),out=new Uint8Array(tot);
          let off=0;for(const c of chunks){out.set(c,off);off+=c.length;}
          return new TextDecoder().decode(out);
        }
        throw new Error('Unsupported ZIP compression type: '+comp);
      }
      pos+=46+nLen+xLen+cmLen;
    }
    throw new Error('content.xml not found — is this a valid ODS file?');
  },

  _odsParse(xmlStr){
    const doc=new DOMParser().parseFromString(xmlStr,'application/xml');
    const tNS='urn:oasis:names:tc:opendocument:xmlns:table:1.0';
    const oNS='urn:oasis:names:tc:opendocument:xmlns:office:1.0';
    const ct=cell=>{const v=cell.getAttributeNS(oNS,'value');return v!==null?v:(cell.textContent||'').trim();};
    const rc=row=>{
      const out=[];
      for(const cell of row.childNodes){
        if(cell.nodeType!==1)continue;
        const ln=cell.localName;
        if(ln!=='table-cell'&&ln!=='covered-table-cell')continue;
        const rep=parseInt(cell.getAttributeNS(tNS,'number-columns-repeated')||'1');
        const txt=ct(cell);
        for(let i=0;i<(rep>20?1:rep);i++)out.push(txt);
      }
      return out;
    };
    const pd=s=>{
      const m=(s||'').match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
      if(!m)return'';
      let y=parseInt(m[3]);if(y<100)y+=2000;
      return`${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
    };
    const ms=s=>{
      s=(s||'').trim();
      if(/^[LJ]$/i.test(s))return'L';
      if(/half|½|1\/2/i.test(s))return'Half';
      if(/jumbo/i.test(s))return'Jumbo';
      if(/^jr/i.test(s))return'Jr';
      if(/irr.*7/i.test(s))return'Irr7';if(/irr.*6/i.test(s))return'Irr6';
      if(/irr.*5/i.test(s))return'Irr5';if(/irr.*4/i.test(s))return'Irr4';
      if(/irr.*3/i.test(s))return'Irr3';if(/irr.*2/i.test(s))return'Irr2';
      if(/irr/i.test(s))return'Irr1';
      return'L';
    };
    const skip=/^(blank|tps[\s_]|send.?history|total.?pricing)/i;
    const tables=Array.from(doc.getElementsByTagNameNS(tNS,'table'));
    const groups={};
    for(const t of tables){
      const name=t.getAttribute('table:name')||'';
      if(skip.test(name))continue;
      const base=name.replace(/[-_]\d+$/,'');
      if(!groups[base])groups[base]=[];
      groups[base].push(t);
    }
    const colls=[];
    for(const[base,tbls]of Object.entries(groups)){
      let info=null;
      const allBoxRows=[];
      const checkTotals={};
      for(let ti=0;ti<tbls.length;ti++){
        const rows=Array.from(tbls[ti].getElementsByTagNameNS(tNS,'table-row'));
        for(let ri=0;ri<rows.length;ri++){
          const cells=rc(rows[ri]);
          if(ti===0){
            if(ri===1){
              const br=(cells.find(c=>/^Branch:\s*\d/i.test(c))||'').replace(/^Branch:\s*/i,'').trim();
              const ag=(cells.find(c=>/^Agent:\s*/i.test(c))||'').replace(/^Agent:\s*/i,'').trim();
              const dt=cells.find(c=>/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(c))||'';
              info={branch:br,agent:ag,collectionDate:pd(dt),shipmentDate:'',etaManila:''};
            }
            if(ri===2&&info){
              const si=cells.findIndex(c=>/shipment.?date/i.test(c));
              if(si>=0&&cells[si+1])info.shipmentDate=pd(cells[si+1]);
            }
            if(ri===3&&info){
              const ei=cells.findIndex(c=>/eta.?manila/i.test(c));
              if(ei>=0&&cells[ei+1])info.etaManila=cells[ei+1];
            }
          }
          if(ri>=5){
            const rn=cells[0],bol=cells[1];
            if(/^\d+$/.test(rn)&&/^\d{7,}$/.test(bol))allBoxRows.push(cells);
          }
          const line=cells.filter(c=>c).join(' ');
          const cm=line.match(/^(\d{1,5})\s*\/\s*\$(\d[\d,]*(?:\.\d+)?)/);
          if(cm)checkTotals[String(parseInt(cm[1]))]=parseFloat(cm[2].replace(/,/g,''));
        }
      }
      if(!allBoxRows.length||!info?.collectionDate)continue;
      const ckCnt={};
      for(const r of allBoxRows){let p='';for(let ci=3;ci<r.length;ci++){const v=(r[ci]||'').trim();if(v==='$$'||/^\d{1,5}$/.test(v)){p=v;break;}}if(p&&p!=='$$'&&/^\d+$/.test(p)){const nk=String(parseInt(p));ckCnt[nk]=(ckCnt[nk]||0)+1;}}
      const pricing=this.data.pricing||{};
      const boxes=allBoxRows.map(r=>{
        const bol=r[1]||'',name=r[2]||'';
        let sz='L',pay='$$';
        for(let ci=3;ci<r.length;ci++){const v=(r[ci]||'').trim();if(!v)continue;if(v==='$$'||/^\d{1,5}$/.test(v)){pay=v;break;}sz=ms(v);}
        const cash=pay==='$$';
        let cost=0;
        const ckKey=cash?'':String(parseInt(pay));
        if(cash){cost=pricing[sz]||0;}
        else if(/^\d+$/.test(pay)){const tot=checkTotals[ckKey]||0,cnt=ckCnt[ckKey]||1;cost=tot?Math.round(tot/cnt*100)/100:(pricing[sz]||0);}
        return{id:uid(),bolNumber:bol,customerName:name,destination:'',size:sz,cost,payment:cash?'cash':'check',checkNumber:cash?'':ckKey,net:cost};
      });
      colls.push({id:uid(),status:'completed',startDate:info.collectionDate,collectionDate:info.collectionDate,
        shipmentDate:info.shipmentDate,etaManila:info.etaManila,
        branch:info.branch||this.data.settings.branch||'602',
        branchTitle:this.data.settings.branchTitle||'',
        agent:info.agent||this.data.settings.agent||'',
        boxes,other:0,submittedAt:new Date().toISOString()});
    }
    // Dedup: if two ODS sheets share a collection date, merge their boxes (BOL dedup)
    const dateMap={};const deduped=[];
    for(const c of colls){
      if(dateMap[c.collectionDate]){
        const ex=dateMap[c.collectionDate];
        const seen=new Set(ex.boxes.map(b=>b.bolNumber));
        c.boxes.forEach(b=>{if(!seen.has(b.bolNumber)){ex.boxes.push(b);seen.add(b.bolNumber);}});
      } else {
        dateMap[c.collectionDate]=c;deduped.push(c);
      }
    }
    return deduped.sort((a,b)=>b.collectionDate.localeCompare(a.collectionDate));
  },

  _odsPreview(){

    document.getElementById('mr').innerHTML=`<div class="mb" onclick="App.cm(event)"><div class="md" onclick="event.stopPropagation()" style="max-width:540px">

  _odsImport(){
    const checked=new Set([...document.querySelectorAll('.ods-chk:checked')].map(c=>c.value));
    const toImport=(this._odsQueue||[]).filter(c=>checked.has(c.id));
    if(!toImport.length){alert('No collections selected.');return;}
    // Read pricing override inputs (fall back to current pricing if input missing)
    const szKeys=['L','Half','Jumbo','Jr','Irr1','Irr2','Irr3','Irr4','Irr5','Irr6','Irr7'];
    const overridePricing={};
    szKeys.forEach(k=>{
      const el=document.getElementById('odsp-'+k);
      // Irr2-Irr7 share the Irr1 input value since we only show one Irregular field
      const src=document.getElementById('odsp-'+(k.startsWith('Irr')?'Irr1':k));
      overridePricing[k]=el?parseFloat(el.value)||0:src?parseFloat(src.value)||0:(this.data.pricing[k]||0);
    });
    // Apply override pricing to cash boxes only
    const applyPricing=(boxes)=>{
      boxes.forEach(b=>{
        if(b.payment==='cash'){
          const p=overridePricing[b.size]||0;
          if(p){b.cost=p;b.net=p;}
        }
      });
    };
    let newCount=0,mergeAdded=0,mergeSkipped=0,activeAdded=0,activeSkipped=0;
    const dateTargetMap={}; // tracks which collection owns each date this import run
    for(const c of toImport){
      applyPricing(c.boxes);
      if(c._importMode==='merge'||c._importMode==='new'){
        // If another queue item already claimed this date, merge into it instead
        let target=dateTargetMap[c.collectionDate];
        if(!target&&c._importMode==='merge'){
          target=this.data.collections.find(x=>x.collectionDate===c.collectionDate&&x.status==='completed');
        }
        if(target){
          dateTargetMap[c.collectionDate]=target;
          const existingBols=new Set(target.boxes.map(b=>b.bolNumber));
          c.boxes.forEach(b=>{
            if(existingBols.has(b.bolNumber)){mergeSkipped++;}
            else{target.boxes.push(b);mergeAdded++;}
          });
        } else {
          this.data.collections.push(c);
          dateTargetMap[c.collectionDate]=c;
          newCount++;
        }
      } else if(c._importMode==='active'){
        // Append non-duplicate BOLs into the active collection
        const target=this.ac();
        if(target){
          const existingBols=new Set(target.boxes.map(b=>b.bolNumber));
          c.boxes.forEach(b=>{
            if(existingBols.has(b.bolNumber)){activeSkipped++;}
            else{target.boxes.push(b);activeAdded++;}
          });
        } else {
          // No active collection — fall back to new
          this.data.collections.push(c);newCount++;
        }
      } else {
        this.data.collections.push(c);newCount++;
      }
    }
    this.save();this.cm();this.render();
    // Build descriptive toast
    const parts=[];
    if(newCount)parts.push(`${newCount} collection${newCount!==1?'s':''} imported`);
    if(mergeAdded||mergeSkipped){
      let m=`${mergeAdded} box${mergeAdded!==1?'es':''} merged into history`;
      if(mergeSkipped)m+=` (${mergeSkipped} duplicate${mergeSkipped!==1?'s':''} skipped)`;
      parts.push(m);
    }
    if(activeAdded||activeSkipped){
      let a=`${activeAdded} box${activeAdded!==1?'es':''} added to active`;
      if(activeSkipped)a+=` (${activeSkipped} duplicate${activeSkipped!==1?'s':''} skipped)`;
      parts.push(a);
    }
    toast(parts.join(' · ')||'Nothing imported.');
    this._odsQueue=null;
  },

  exportContactsCSV(){

  importContactsCSV(){
    const inp=document.createElement('input');inp.type='file';inp.accept='.csv';
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        const incoming=this.parseContactsCSV(ev.target.result);
        if(!incoming.length){alert('No LBC contacts found in file.');return;}
        const existing=this.data.contacts||[];
        const hasExisting=existing.length>0;

        let choice='overwrite';
        if(hasExisting){
          const ans=confirm(
            `Found ${incoming.length} contacts in file.\n\n`+
            `You currently have ${existing.length} contacts saved.\n\n`+
            `OK = Overwrite (replace everything with the new file)\n`+
            `Cancel = Merge (add new contacts, update existing ones by name)`
          );
          choice=ans?'overwrite':'merge';
        }

        let final=incoming;
        let added=0,updated=0;

        if(choice==='merge'){
          // Build lookup of existing contacts by normalized displayName
          const byName=new Map();
          existing.forEach(c=>byName.set((c.displayName||'').toLowerCase().trim(),c));
          final=[...existing];
          incoming.forEach(nc=>{
            const key=(nc.displayName||'').toLowerCase().trim();
            if(byName.has(key)){
              // Update in place — overwrite fields from new CSV but keep id
              const old=byName.get(key);
              Object.assign(old,{...nc,id:old.id});
              updated++;
            } else {
              final.push(nc);
              added++;
            }
          });
          this.data.contacts=final;
          this.data.contactsImportedAt=new Date().toISOString();
          this.save();this.openContacts.clear();this.rContacts();
          toast(`Merged: ${added} added, ${updated} updated.`);
        } else {
          this.data.contacts=incoming;
          this.data.contactsImportedAt=new Date().toISOString();
          this.save();this.openContacts.clear();this.rContacts();
          toast(`Imported ${incoming.length} contacts.`);
        }
      };r.readAsText(f);
    };inp.click();
  },

  parseContactsCSV(text){
    const rows=this.csvParse(text);
    const contacts=[];
    rows.forEach(row=>{
      const fn=(row['First Name']||'').trim();
      const ln=(row['Last Name']||'').trim();
      if(!fn&&!ln)return;
      let displayName,firstName,lastName,note='';
      if(fn.match(/^LBC/i)){
        let stripped=fn.replace(/^LBC\s*\?*\s*/i,'').trim();
        const nm=stripped.match(/\(([^)]+)\)/);
        if(nm){note=nm[1].trim();stripped=stripped.replace(/\s*\([^)]*\)/g,'').trim();}
        const parts=stripped.split(/\s+/).filter(Boolean);
        lastName=parts.length>1?parts[parts.length-1]:'';
        const noMid=parts.slice(0,-1).filter(p=>!/^[A-Z]{1,2}\.$/.test(p));
        firstName=noMid.join(' ');
        displayName=stripped||fn;
      } else {
        firstName=fn;lastName=ln;
        displayName=ln?ln+', '+fn:fn;
      }
      if(!displayName.trim())return;
      const gc=(col)=>(row[col]||'').split(':::')[0].trim();
      // Parse a formatted address block ("Street\nCity, ST Zip\nCountry") into components
      const parseFormatted=(raw)=>{
        if(!raw)return{};
        const lines=raw.split(/[\n\r]+/).map(s=>s.trim()).filter(Boolean);
        if(!lines.length)return{};
        const street=lines[0];
        let city='',state='',zip='';
        if(lines[1]){
          const m=lines[1].match(/^(.+?),?\s+([A-Z]{2})\s+([\d\-]+)/);
          if(m){city=m[1].trim();state=m[2];zip=m[3].replace(/-\d+$/,'');}
          else city=lines[1];
        }
        return{street,city,state,zip};
      };
      const a1str=gc('Address 1 - Street'),a1city=gc('Address 1 - City'),a1state=gc('Address 1 - Region'),a1zip=gc('Address 1 - Postal Code');
      const a2str=gc('Address 2 - Street'),a2city=gc('Address 2 - City'),a2state=gc('Address 2 - Region'),a2zip=gc('Address 2 - Postal Code');
      // Fall back to parsing the Formatted column when individual fields are empty
      const fb1=(!a1str&&!a1city)?parseFormatted(gc('Address 1 - Formatted')):{};
      const fb2=(!a2str&&!a2city)?parseFormatted(gc('Address 2 - Formatted')):{};
      contacts.push({id:uid(),displayName:displayName.trim(),firstName:firstName.trim(),lastName:lastName.trim(),note,
        phone1:(row['Phone 1 - Value']||'').trim(),phone2:(row['Phone 2 - Value']||'').trim(),

        address:a1str||fb1.street||'',city:a1city||fb1.city||'',state:a1state||fb1.state||'',zip:a1zip||fb1.zip||'',
        address2:a2str||fb2.street||'',city2:a2city||fb2.city||'',state2:a2state||fb2.state||'',zip2:a2zip||fb2.zip||''});
    });
    return contacts;
  },

  csvParse(text){
    // Character-by-character parser — handles quoted fields containing newlines
    const src=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    const records=[];
    let fields=[],cur='',inQ=false;
    for(let i=0;i<src.length;i++){
      const c=src[i];
      if(inQ){
        if(c==='"'){
          if(src[i+1]==='"'){cur+='"';i++;}  // escaped ""
          else inQ=false;                      // closing quote
        } else {
          cur+=c;  // newlines inside quotes become spaces to keep values clean
        }
      } else {
        if(c==='"'){inQ=true;}
        else if(c===','){fields.push(cur.trim());cur='';}
        else if(c==='\n'){fields.push(cur.trim());cur='';records.push(fields);fields=[];}
        else{cur+=c;}
      }
    }
    if(cur||fields.length){fields.push(cur.trim());records.push(fields);}
    if(!records.length)return[];
    const headers=records[0];
    return records.slice(1).filter(r=>r.some(v=>v)).map(r=>{
      const obj={};headers.forEach((h,i)=>{obj[h]=(r[i]||'').trim();});return obj;
    });
  },

  importData(){
    const inp=document.getElementById('imp-file');inp.value='';
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const d=JSON.parse(ev.target.result.trim());
          if(!Array.isArray(d.collections))throw new Error();
          const hasContacts=(this.data.contacts||[]).length;
          const msg=`Restore from backup?\n\nBackup: ${d.collections.length} collections, ${d.contacts?.length||0} contacts\nCurrent: ${this.data.collections.length} collections, ${hasContacts} contacts\n\nData will be merged — the version with more entries wins for each section.`;
          if(!confirm(msg))return;
          this.data=this._mergeData(this.data,d);this.save();this.render();toast('Restore complete. Data merged.');
        }catch(_){alert('Invalid backup file.');}
      };r.readAsText(f);
    };inp.click();
  },

  init(){
    // Migrate v1 data (had shipments[] not collections[])
    if(this.data.shipments&&!this.data.collections){
      this.data.collections=(this.data.shipments||[]).map(s=>({...s,status:'completed',collectionDate:s.date,startDate:s.date}));
      delete this.data.shipments;this.save();
    }
    // Migrate ODS-imported boxes that used wrong field names (bol→bolNumber, name→customerName, checkNum→checkNumber)
    let migrated=false;
    (this.data.collections||[]).forEach(c=>{
      (c.boxes||[]).forEach(b=>{
        if(b.bol!==undefined&&!b.bolNumber){b.bolNumber=b.bol;delete b.bol;migrated=true;}
        if(b.name!==undefined&&!b.customerName){b.customerName=b.name;delete b.name;migrated=true;}
        if(b.checkNum!==undefined&&!b.checkNumber){b.checkNumber=b.checkNum;delete b.checkNum;migrated=true;}
      });
    });
    if(migrated)this.save();
    this.setView('active');
    this._updateFileStatus();
    // Try to restore last-used file handle from IndexedDB
    this._restoreHandle().then(async handle=>{
      if(!handle)return;
      const perm=await handle.queryPermission({mode:'readwrite'}).catch(()=>'prompt');
      if(perm==='granted'){
        // Verify the file is actually accessible before marking connected
        try{
          await handle.getFile();
        }catch(e){
          // File gone or inaccessible — clear stored handle
          await this._forgetHandle();
          this._updateFileStatus();
          toast('Last data file could not be found. Please reconnect.');
          return;
        }
        this.fileHandle=handle;
        this._updateFileStatus();
        await this._readFromFile();
      }else{
        this._showReconnectBanner(handle);
      }
    });
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible')this._readFromFile();
    });
    document.addEventListener('click',e=>{
      if(!e.target.closest('.badge-wrap'))document.querySelectorAll('.badge-menu.on').forEach(el=>el.classList.remove('on'));
    });
    document.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&document.activeElement?.closest('#ar'))App.addBox();
      if(e.key==='Escape'&&document.getElementById('mr').children.length)App.cm();
    });
    const _sn=document.getElementById('scroll-nav');
    const _main=document.getElementById('main');
    if(_sn&&_main){
      const _showSN=()=>{_sn.style.display=_main.scrollHeight>_main.clientHeight+50?'flex':'none';};
      _main.addEventListener('scroll',_showSN,{passive:true});
      window.addEventListener('resize',_showSN,{passive:true});
      const _origRender=this.render.bind(this);
      this.render=function(){_origRender();setTimeout(_showSN,50);};
    }
  }
};

const Calc={
  val:'0',expr:'',op:null,prev:null,fresh:false,tape:[],
  el(){return document.getElementById('calc-popup');},
  toggle(){const el=this.el();el.classList.toggle('open');document.getElementById('calc-btn').classList.toggle('on',el.classList.contains('open'));},
  upd(){
    document.getElementById('calc-val').textContent=this.val;
    document.getElementById('calc-expr').textContent=this.expr;
    const t=document.getElementById('calc-tape');
    t.innerHTML=this.tape.map((l,i)=>`<div${i===this.tape.length-1&&l.startsWith('=')?` class="tape-total"`:''}>${l}</div>`).join('');
    t.scrollTop=t.scrollHeight;
  },
  num(n){
    if(this.fresh){this.val='0';this.fresh=false;}
    if(n==='00'){if(this.val==='0')return;this.val+=n;}
    else if(n==='.'){if(this.val.includes('.'))return;this.val+=n;}
    else{this.val=this.val==='0'?n:this.val+n;}
    if(this.val.length>15)this.val=this.val.slice(0,15);
    this.upd();
  },
  setOp(o){
    const v=parseFloat(this.val)||0;
    if(this.op&&!this.fresh){this.calc(false);}
    else{this.prev=v;}
    this.op=o;this.expr=this._fmt(this.prev)+' '+o;this.fresh=true;this.upd();
  },
  calc(final=true){
    const v=parseFloat(this.val)||0;
    const p=this.prev??v;
    let r=p;
    const opSym=this.op||'=';
    if(this.op==='+')r=p+v;
    else if(this.op==='-')r=p-v;
    else if(this.op==='×')r=p*v;
    else if(this.op==='÷')r=v!==0?p/v:0;
    r=parseFloat(r.toPrecision(12));
    if(final){
      this.tape.push(`${this._fmt(p)} ${opSym} ${this._fmt(v)}`);
      this.tape.push(`= ${this._fmt(r)}`);
      if(this.tape.length>40)this.tape=this.tape.slice(-40);
      this.expr='';this.op=null;this.prev=null;this.fresh=true;
    } else {
      this.prev=r;this.expr=this._fmt(r)+' '+(this.op||'');this.fresh=true;
    }
    this.val=this._fmt(r);this.upd();
  },
  pct(){const v=parseFloat(this.val)||0;const p=this.prev??0;this.val=this._fmt(p?v/100*p:v/100);this.fresh=true;this.upd();},
  sign(){this.val=this._fmt(-(parseFloat(this.val)||0));this.upd();},
  ce(){this.val='0';this.upd();},
  clr(){this.val='0';this.expr='';this.op=null;this.prev=null;this.fresh=false;this.upd();},
  back(){if(this.fresh)return;this.val=this.val.length>1?this.val.slice(0,-1):'0';this.upd();},
  clearTape(){this.tape=[];this.upd();},
  _fmt(n){const s=String(n);return s.length>12?parseFloat(n.toPrecision(10)).toString():s;},
  _key(e){
    if(!this.el().classList.contains('open'))return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    const k=e.key,c=e.code;
    if((k>='0'&&k<='9')||c==='Numpad0'||c==='Numpad1'||c==='Numpad2'||c==='Numpad3'||c==='Numpad4'||c==='Numpad5'||c==='Numpad6'||c==='Numpad7'||c==='Numpad8'||c==='Numpad9'){e.preventDefault();this.num(c.startsWith('Numpad')?c.slice(-1):k);}
    else if(k==='.'||c==='NumpadDecimal'){e.preventDefault();this.num('.');}
    else if(k==='+'||c==='NumpadAdd'){e.preventDefault();this.setOp('+');}
    else if(k==='-'||c==='NumpadSubtract'){e.preventDefault();this.setOp('-');}
    else if(k==='*'||c==='NumpadMultiply'){e.preventDefault();this.setOp('×');}
    else if(k==='/'||c==='NumpadDivide'){e.preventDefault();this.setOp('÷');}
    else if(k==='%'){e.preventDefault();this.pct();}
    else if(k==='Enter'||k==='='||c==='NumpadEnter'){e.preventDefault();this.calc();}
    else if(k==='Backspace'){e.preventDefault();this.back();}
    else if(k==='Delete'){e.preventDefault();this.clr();}
    else if(k==='Escape'){e.preventDefault();this.toggle();}
  },
};

// Draggable + keyboard — deferred so #calc-popup exists in DOM
setTimeout(()=>{
  let dx=0,dy=0,x=0,y=0,dragging=false;
  const h=document.getElementById('calc-title');
  const p=document.getElementById('calc-popup');
  if(h&&p){
    h.addEventListener('mousedown',e=>{dragging=true;x=e.clientX;y=e.clientY;e.preventDefault();});
    document.addEventListener('mousemove',e=>{
      if(!dragging)return;
      dx=x-e.clientX;dy=y-e.clientY;x=e.clientX;y=e.clientY;
      p.style.top=(p.offsetTop-dy)+'px';p.style.right='auto';p.style.left=(p.offsetLeft-dx)+'px';
    });
    document.addEventListener('mouseup',()=>{dragging=false;});
  }
  document.addEventListener('keydown',e=>Calc._key(e));
},0);
</script>

  <div class="content">
    <div class="section">
      <div class="section-header"><span class="section-num">01</span><span class="section-title">Overview</span></div>
      <p>LBC Collection Manager is a single-file portable web application designed for LBC Cargo Branch 602 agents in Florida. It runs entirely in any modern browser (Chrome or Edge recommended) directly from a local HTML file — no server, no internet connection required for day-to-day use.</p>
      <p>All data is stored in a <strong>JSON file on your computer</strong> that you choose and control. Multiple computers can share the same JSON file over a network drive or synced folder, allowing a team to work from a common dataset.</p>
      <div class="tbl-wrap"><table class="guide-table"><thead><tr><th>Feature</th><th>Description</th></tr></thead><tbody>
        <tr><td>Active Collection</td><td>Record box entries in real time on pickup day</td></tr>
        <tr><td>History</td><td>View, audit, and export all completed collections</td></tr>
        <tr><td>Reports</td><td>Sortable summaries by month, box size, checks, and detail line items</td></tr>
        <tr><td>Analytics</td><td>Period-over-period comparisons and trend charts</td></tr>
        <tr><td>Search</td><td>Full-text search across all BOL numbers, customers, and check numbers</td></tr>
        <tr><td>Contacts</td><td>Customer address book linked to shipment history</td></tr>
        <tr><td>Boxes Inventory</td><td>Track individual box status and outgoing log</td></tr>
        <tr><td>Calculator</td><td>Pop-out 10-key calculator with keyboard support</td></tr>
        <tr><td>ODS Import</td><td>Bulk import from legacy spreadsheet files with pricing override</td></tr>
      </tbody></table></div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">02</span><span class="section-title">Getting Started</span></div>
      <div class="subsection">
        <div class="subsection-title">2.1 &nbsp; First Launch</div>
        <p>Open <strong>LBC-CRM.html</strong> in Chrome or Edge by double-clicking the file. The app loads instantly. On the very first launch, data lives only in the browser's local storage — it is not yet connected to a persistent file on disk.</p>
        <div class="callout warn"><span class="callout-icon">⚠</span><span>Local storage can be cleared by the browser. Always connect a data file (see below) to ensure your data is safely saved to disk.</span></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">2.2 &nbsp; Creating a Data File</div>
        <p>To save your data persistently to a file on disk:</p>
        <ul class="guide-list">
          <li>Open <strong>Settings</strong> (⚙ gear icon, top-right corner).</li>
          <li>Under <strong>Data</strong>, click <strong>Create New Data File</strong>.</li>
          <li>A <em>Save As</em> dialog appears. Choose a folder and name the file (e.g. <code>LBC-CRM-data.json</code>). Click Save.</li>
          <li>The footer turns <span class="green">green</span> and shows the filename — you are now connected.</li>
          <li>From this point, every save automatically writes to that file.</li>
        </ul>
        <div class="callout tip"><span class="callout-icon">💡</span><span>Store the JSON file in a shared network folder or cloud-synced directory (OneDrive, Google Drive) to enable multi-PC access.</span></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">2.3 &nbsp; Connecting to an Existing Data File</div>
        <p>On a second computer, or after moving the file, connect the app to the existing data:</p>
        <ul class="guide-list">
          <li>Open <strong>Settings → Connect to Existing File</strong>.</li>
          <li>An <em>Open</em> dialog appears. Browse to and select your <code>.json</code> data file.</li>
          <li>The app loads all data from the file. The footer shows the filename in green.</li>
        </ul>
        <div class="callout warn"><span class="callout-icon">⚠</span><span>This is an Open dialog, not Save As — it never overwrites your file on connect. Data is read first, then the connection is established.</span></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">2.4 &nbsp; Auto-Reconnect on Reload</div>
        <p>The app remembers your last-used data file using the browser's IndexedDB storage. When you reload or reopen the HTML file:</p>
        <ul class="guide-list">
          <li><strong>If the browser still holds permission</strong> (same session): reconnects silently, no click needed.</li>
          <li><strong>If permission expired</strong> (new browser session): a blue banner appears at the top with a single <strong>Reconnect</strong> button. One click re-grants permission and loads data.</li>
          <li><strong>If the file was deleted or moved to another drive</strong>: the banner appears, but clicking Reconnect will show "File no longer exists — please connect a new data file." The stored handle is cleared and the footer turns grey.</li>
        </ul>
        <div class="callout tip"><span class="callout-icon">💡</span><span>Moving the file to a different folder on the same drive is fine — the browser handle follows it automatically.</span></div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">03</span><span class="section-title">Navigation &amp; Header</span></div>
      <div class="subsection">
        <div class="subsection-title">3.1 &nbsp; Tab Bar</div>
        <div class="tbl-wrap"><table class="guide-table"><thead><tr><th>Tab</th><th>Purpose</th></tr></thead><tbody>
          <tr><td>Active</td><td>Current open collection — add and edit boxes in real time</td></tr>
          <tr><td>History</td><td>All completed (submitted) collections</td></tr>
          <tr><td>Reports</td><td>Tabular summaries — monthly, by box size, checks, and detail</td></tr>
          <tr><td>Analytics</td><td>Charts and period comparisons</td></tr>
          <tr><td>Search</td><td>Search across all BOL numbers, customer names, and check numbers</td></tr>
          <tr><td>Contacts</td><td>Customer address book</td></tr>
          <tr><td>📦 Boxes</td><td>Inventory of individual boxes with outgoing log</td></tr>
        </tbody></table></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">3.2 &nbsp; Calculator</div>
        <p>A pop-out 10-key calculator is accessible via the calculator icon in the header. It supports both mouse clicks and full keyboard input:</p>
        <ul class="guide-list">
          <li>Number row (0–9) and numeric keypad</li>
          <li>Operators: <code>+</code> <code>-</code> <code>*</code> <code>/</code> (keyboard or on-screen)</li>
          <li><code>Enter</code> or <code>NumpadEnter</code> to calculate</li>
          <li><code>Backspace</code> to delete last digit, <code>Escape</code> to clear</li>
          <li>Tape history scrolls within the popup — the calculator can be dragged to any position on screen</li>
        </ul>
      </div>
      <div class="subsection">
        <div class="subsection-title">3.3 &nbsp; Refresh Button (↺)</div>
        <p>The circular arrow button next to the calculator manually re-reads the connected JSON file from disk and reloads all data. Use this to pull in changes made by another computer on a shared file.</p>
        <p>The app also <strong>auto-refreshes</strong> whenever you switch back to the browser tab after having it in the background.</p>
        <div class="callout tip"><span class="callout-icon">💡</span><span>If no file is connected, the button shows a toast: "No data file connected."</span></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">3.4 &nbsp; Settings (⚙ Gear)</div>
        <p>The gear icon opens the Settings &amp; Tools panel, organized into sections: <strong>Account</strong> (Branch Settings, Pricing), <strong>Data</strong> (file management, backup, ODS import), and <strong>App</strong> (update checker, Help). Close by clicking × or clicking outside the panel.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">3.5 &nbsp; Footer Status Bar</div>
        <p>The footer at the bottom of every page shows your data file connection status at a glance:</p>
        <ul class="guide-list">
          <li><span class="green">● Green dot + filename</span>: a data file is connected and active (e.g. <code>LBC-CRM-data.json</code>).</li>
          <li><span style="color:#6b7280;font-weight:600">● Grey dot + "NO FILE CONNECTED"</span>: no data file is linked. Data is only in browser local storage and at risk of loss on a browser clear.</li>
        </ul>
        <div class="callout warn"><span class="callout-icon">⚠</span><span>The browser API only exposes the filename, not the full folder path. Name your file descriptively (e.g. <code>LBC-602-main.json</code>) to avoid confusion when multiple files exist.</span></div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">04</span><span class="section-title">Active Collection</span></div>
      <p>The <strong>Active</strong> tab is your live workspace on pickup day. One collection is open at a time. Boxes are added one by one as customers arrive.</p>
      <div class="subsection">
        <div class="subsection-title">4.1 &nbsp; Starting a Collection</div>
        <p>When no collection is open, the Active tab prompts you to start one. Enter the collection date, branch number, and agent name, then click <strong>Start Collection</strong>. The entry form appears immediately.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">4.2 &nbsp; Adding Box Entries</div>
        <p>Fill in the entry row at the top of the table:</p>
        <div class="tbl-wrap"><table class="guide-table"><thead><tr><th>Field</th><th>Description</th></tr></thead><tbody>
          <tr><td>BOL Number</td><td>Bill of Lading number — must be <strong>8 or more digits</strong></td></tr>
          <tr><td>Customer</td><td>Last name, First name (or full name)</td></tr>
          <tr><td>Destination</td><td>City or region (optional)</td></tr>
          <tr><td>Size</td><td>Large / Half / Jumbo / Jr Box / Irregular (Irr1–Irr7)</td></tr>
          <tr><td>Cost</td><td>Auto-fills from the pricing table when Size is selected</td></tr>
          <tr><td>Net</td><td>Override the cost if a discount applies</td></tr>
          <tr><td>Payment</td><td>Cash, Check, or Split (part cash / part check)</td></tr>
          <tr><td>Check #</td><td>Appears when Payment = Check or Split; up to 5 digits</td></tr>
        </tbody></table></div>
        <p>Press <strong>Enter</strong> or click <strong>Add</strong> to save the row. The cursor returns to the BOL field for the next entry.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">4.3 &nbsp; Payment Types</div>
        <div class="sub2"><div class="sub2-title">Cash</div><p>Select Cash from the Payment dropdown. No check number required. The cost is set by the pricing table.</p></div>
        <div class="sub2"><div class="sub2-title">Check</div><p>Select Check and enter the check number (up to 5 digits). Check numbers are always 5 digits or fewer; BOL numbers are always 8 or more — these two ranges never overlap.</p></div>
        <div class="sub2"><div class="sub2-title">Split</div><p>Select Split… to open the split payment dialog. Enter the cash amount, check amount, and check number. A mismatch warning appears if the total does not equal the box cost.</p></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">4.4 &nbsp; Editing &amp; Deleting Rows</div>
        <p>Each saved row shows a <strong>✓ Save</strong> and <strong>× Delete</strong> button. Edit any field inline, then click ✓ to commit. A payment mismatch warning fires if the new amounts do not match the cost.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">4.5 &nbsp; Submitting a Collection</div>
        <p>When all boxes are entered, click <strong>Submit Collection</strong>. The collection moves to History with status <em>Completed</em>. A fresh Active tab is ready for the next pickup.</p>
        <div class="callout warn"><span class="callout-icon">⚠</span><span>Submitted collections cannot be edited from the Active tab. Use <strong>History → Edit Entries</strong> to make corrections after submission.</span></div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">05</span><span class="section-title">History</span></div>
      <p>The <strong>History</strong> tab lists every completed collection as a collapsible card showing date, branch, agent, total value, and box count.</p>
      <div class="subsection">
        <div class="subsection-title">5.1 &nbsp; Viewing Completed Collections</div>
        <p>Click any card header to expand it and see the full box table. Click again to collapse.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">5.2 &nbsp; Sorting</div>
        <p>Click any column header inside an expanded card to sort by that column. Click again to reverse direction. Sort indicators (▲ ▼) show the active column and direction.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">5.3 &nbsp; Editing Entries (Audit Mode)</div>
        <p>Each card has an <strong>✏ Edit Entries</strong> button. Clicking it switches that card's rows into fully editable mode — the same inline inputs as the Active tab. A purple outline marks the card as being edited.</p>
        <ul class="guide-list">
          <li>Fix check numbers, amounts, customer names, sizes, or destinations.</li>
          <li>Click <strong>✓</strong> on each row to save that row's changes.</li>
          <li>Click <strong>✓ Done Editing</strong> (green button) to return to read-only view.</li>
        </ul>
        <div class="callout tip"><span class="callout-icon">💡</span><span>Use Edit Entries to reconcile the web app against a physical ODS spreadsheet when discrepancies are found.</span></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">5.4 &nbsp; Print &amp; PDF Export</div>
        <p>Each card offers two export options in its action bar:</p>
        <ul class="guide-list">
          <li><strong>🖨 Print Report</strong>: opens a print-formatted collection report in a new window.</li>
          <li><strong>💾 Save PDF</strong>: generates and downloads a PDF of the collection report directly.</li>
        </ul>
      </div>
      <div class="subsection">
        <div class="subsection-title">5.5 &nbsp; Re-opening a Collection</div>
        <p>Click <strong>↩ Re-open</strong> to move a completed collection back to the Active tab for continued editing. Useful if a collection was submitted prematurely or needs additional entries.</p>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">06</span><span class="section-title">Reports</span></div>
      <p>The <strong>Reports</strong> tab provides date-filtered tabular summaries. Set a date range at the top and choose a report type:</p>
      <div class="tbl-wrap"><table class="guide-table"><thead><tr><th>Report</th><th>Shows</th></tr></thead><tbody>
        <tr><td>Overview</td><td>Total cash, checks, and box count per collection</td></tr>
        <tr><td>Detailed</td><td>Every collection with per-box line items</td></tr>
        <tr><td>Checks</td><td>Every check payment grouped by check number with sub-rows per box; includes Check Summary table</td></tr>
      </tbody></table></div>
      <p>All report tables are <strong>sortable</strong> — click any column header to sort ascending; click again to sort descending. Reports can be printed or saved as PDF using the buttons at the top of the Reports view.</p>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">07</span><span class="section-title">Analytics</span></div>
      <p>The <strong>Analytics</strong> tab appears after at least two completed collections are recorded. It provides:</p>
      <ul class="guide-list">
        <li>Period-over-period comparisons (current range vs prior range)</li>
        <li>Total value, box count, average per collection, cash vs check split</li>
        <li>Trend charts over time</li>
        <li>Date range filters to focus on any window of history</li>
      </ul>
      <p>Use the <strong>From / To</strong> date pickers at the top to set the primary period. A comparison period can optionally be set to benchmark against a prior span.</p>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">08</span><span class="section-title">Search</span></div>
      <p>The <strong>Search</strong> tab lets you find any box entry across all collections. Filter by one or more fields simultaneously:</p>
      <ul class="guide-list">
        <li><strong>Customer name</strong>: partial match on last or first name</li>
        <li><strong>BOL number</strong>: partial numeric match</li>
        <li><strong>Check number</strong>: exact or partial match</li>
        <li><strong>Pickup Date</strong>: exact match on the box pickup date</li>
        <li><strong>Date range</strong>: from/to collection date</li>
      </ul>
      <p>Results show the collection date, BOL, customer, destination, size, and payment. Results update live as you type.</p>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">09</span><span class="section-title">Contacts</span></div>
      <p>The <strong>Contacts</strong> tab is a customer address book. Each contact can store name, phone numbers, email, two addresses (local and Philippines), and free-text notes.</p>
      <p>Contacts are linked to shipment history — open a contact card to see every collection entry matched to that customer by name.</p>
      <div class="subsection">
        <div class="subsection-title">Import / Export</div>
        <p>Contacts can be exported to a <code>.csv</code> file and imported back — useful for backup or moving between machines. Import supports both <strong>Overwrite</strong> (replace all) and <strong>Merge</strong> (add new, update existing by name) modes. Access import/export under <strong>Settings → Contacts</strong>.</p>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">10</span><span class="section-title">Boxes Inventory</span></div>
      <p>The <strong>📦 Boxes</strong> tab tracks individual box units (distinct from collection entries). Each box record has a size, status, and an outgoing log.</p>
      <ul class="guide-list">
        <li>Add boxes by size to your inventory</li>
        <li>Mark boxes as available, in use, or shipped</li>
        <li>Log outgoing box movements with date, quantity, and recipient notes</li>
        <li>Print an inventory report from this tab</li>
      </ul>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">11</span><span class="section-title">Settings &amp; Tools</span></div>
      <p>Open with the <strong>⚙ gear icon</strong> (top-right). Close by clicking × or clicking outside the panel.</p>
      <div class="subsection">
        <div class="subsection-title">11.1 &nbsp; Branch Settings</div>
        <p>Set your branch number, branch title, and default agent name. These values pre-fill on new collections and appear on printed reports.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">11.2 &nbsp; Pricing</div>
        <p>Set the standard rate for each box size. Rates auto-fill the Cost field when a size is selected during entry.</p>
        <div class="tbl-wrap"><table class="guide-table"><thead><tr><th>Size Code</th><th>Description</th></tr></thead><tbody>
          <tr><td>L</td><td>Large box</td></tr>
          <tr><td>Half</td><td>Half box</td></tr>
          <tr><td>Jumbo</td><td>Jumbo box</td></tr>
          <tr><td>Jr</td><td>Junior box</td></tr>
          <tr><td>Irr1 – Irr7</td><td>Irregular boxes (7 price tiers)</td></tr>
        </tbody></table></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">11.3 &nbsp; Data File Management</div>
        <ul class="guide-list">
          <li><strong>Connect to Existing File</strong>: opens an <em>Open</em> dialog to link an existing <code>.json</code> data file. All data from the file loads into the app. Never overwrites on connect — read only.</li>
          <li><strong>Create New Data File</strong>: opens a <em>Save As</em> dialog to create a new empty file. Current app data is written to the new file immediately.</li>
        </ul>
      </div>
      <div class="subsection">
        <div class="subsection-title">11.4 &nbsp; Backup &amp; Restore</div>
        <p><strong>Backup</strong> downloads the entire dataset as a timestamped <code>.json</code> snapshot — independent of the live data file. Take backups before major imports or changes.</p>
        <p><strong>Restore</strong> merges a backup <code>.json</code> into the current dataset. Collections are merged by date, contacts by name. It does not wipe existing data.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">11.5 &nbsp; Import from ODS Spreadsheet</div>
        <p>See <strong>Section 13</strong> for a full reference. In brief: click <strong>Import from Spreadsheet</strong>, select an <code>.ods</code> file, review the preview table (duplicates are auto-unchecked), optionally adjust pricing in the Pricing Override panel, and click <strong>Import Selected</strong>.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">11.6 &nbsp; Check for Updates</div>
        <p>Under the <strong>App</strong> section, click <strong>Check for Updates</strong> to compare your current version against the latest release on GitHub.</p>
        <ul class="guide-list">
          <li><strong>Up to date</strong>: shows your version and confirms it is current.</li>
          <li><strong>Update available</strong>: shows the new version number and a <strong>Download &amp; replace file</strong> button.</li>
        </ul>
        <p>Clicking Download opens a <em>Save As</em> dialog. Save over your existing <code>LBC-CRM.html</code> file to apply the update. Reopen the file in the browser to run the new version. Your data file is unaffected.</p>
        <div class="callout warn"><span class="callout-icon">⚠</span><span>An internet connection is required to check for updates.</span></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">11.7 &nbsp; Help</div>
        <p>Click <strong>Help</strong> in the App section to open this reference manual in a new browser tab. It opens from the embedded copy inside the app — no separate file needed.</p>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">12</span><span class="section-title">Multi-PC Shared Data Workflow</span></div>
      <p>The app supports a shared JSON file workflow where multiple computers read from and write to the same data file on a network drive or synced folder.</p>
      <div class="subsection">
        <div class="subsection-title">Setup</div>
        <ul class="guide-list">
          <li>Computer A creates the data file in a shared/synced location (e.g. a OneDrive folder visible to both machines).</li>
          <li>Computer B opens the app and uses <strong>Connect to Existing File</strong> to link the same file.</li>
          <li>Both computers now share the same dataset and save to the same file.</li>
        </ul>
      </div>
      <div class="subsection">
        <div class="subsection-title">Staying in Sync</div>
        <ul class="guide-list">
          <li><strong>Auto-refresh on tab focus</strong>: whenever you switch back to the browser tab, the app re-reads the file and reloads data automatically.</li>
          <li><strong>Manual refresh</strong>: click the ↺ button in the header at any time to pull the latest data from the file immediately.</li>
        </ul>
      </div>
      <div class="subsection">
        <div class="subsection-title">Important Considerations</div>
        <ul class="guide-list">
          <li><strong>One writer at a time</strong>: the app does not have real-time conflict resolution. Avoid two users saving simultaneously to prevent one overwriting the other's changes.</li>
          <li><strong>Cloud sync folders</strong> (OneDrive, Google Drive, Dropbox): work well for non-simultaneous use. Allow sync to complete before the second user opens the app.</li>
          <li><strong>Network drives</strong>: the drive must be mounted and accessible. If the drive is offline, the app falls back to browser local storage until reconnected.</li>
        </ul>
        <div class="callout tip"><span class="callout-icon">💡</span><span>Click the Refresh button before starting a new collection entry to ensure you have the latest data from other users.</span></div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-num">13</span><span class="section-title">ODS Import Reference</span></div>
      <p>The ODS import reads legacy <code>.ods</code> spreadsheet files (OpenDocument Spreadsheet format, as produced by the original LBC collection spreadsheet). It runs entirely in the browser — no server or external tool required.</p>
      <div class="subsection">
        <div class="subsection-title">13.1 &nbsp; Field Mapping Rules</div>
        <div class="tbl-wrap"><table class="guide-table"><thead><tr><th>ODS Content</th><th>Imported As</th><th>Rule</th></tr></thead><tbody>
          <tr><td>Row number column</td><td>(skipped)</td><td>Rows without a valid row number are ignored</td></tr>
          <tr><td>BOL column</td><td>bolNumber</td><td>Must be <strong>8 or more digits</strong> — shorter numbers are treated as check numbers</td></tr>
          <tr><td>Name column</td><td>customerName</td><td>Imported as-is</td></tr>
          <tr><td>Size column</td><td>size</td><td>See size codes below</td></tr>
          <tr><td><code>$$</code> in payment col</td><td>payment = cash</td><td>Double dollar sign marks a cash payment</td></tr>
          <tr><td>1–5 digit number</td><td>payment = check</td><td>Short numbers are check numbers, never BOL numbers</td></tr>
          <tr><td><code>checkNum / $amt</code></td><td>checkTotals</td><td>Parsed from the "Florida Agents Use Only" section; <code>/</code> is a literal separator, never division</td></tr>
        </tbody></table></div>
        <div class="sub2" style="margin-top:18px">
          <div class="sub2-title">Size Code Mapping</div>
          <div class="tbl-wrap"><table class="guide-table"><thead><tr><th>ODS Value</th><th>Imported Size</th></tr></thead><tbody>
            <tr><td>L &nbsp;or&nbsp; J &nbsp;(legacy pre-2025)</td><td>Large (L)</td></tr>
            <tr><td>Half, ½, 1/2</td><td>Half Box</td></tr>
            <tr><td>Jumbo (full word)</td><td>Jumbo</td></tr>
            <tr><td>Jr…</td><td>Junior Box (Jr)</td></tr>
            <tr><td>Irr + number 1–7</td><td>Irregular (Irr1–Irr7)</td></tr>
          </tbody></table></div>
        </div>
        <div class="callout warn" style="margin-top:10px"><span class="callout-icon">⚠</span><span>The legacy size code <code>J</code> (used before approximately 2025) maps to <strong>Large</strong>. "Jumbo" requires the full word and is never confused with a single <code>J</code>.</span></div>
        <p style="margin-top:12px"><strong>Leading zeros on check numbers:</strong> ODS spreadsheets store numbers without leading zeros (e.g. <code>0096</code> becomes <code>96</code> in the cell value). The importer normalizes both the check totals and box row values by stripping leading zeros before matching, so check <code>0096 / $180</code> is correctly matched to its corresponding box row.</p>
      </div>
      <div class="subsection">
        <div class="subsection-title">13.2 &nbsp; Pricing Override</div>
        <p>By default, cash box costs are looked up from the current pricing table in Settings. For historical imports where rates were different, the import preview provides a <strong>Pricing Override</strong> panel (collapsed by default).</p>
        <ul class="guide-list">
          <li>Expand the panel by clicking the ▶ arrow in the preview dialog.</li>
          <li>Adjust rates for Large, Half, Jumbo, Jr, and Irregular.</li>
          <li>These rates apply only to the current import run — they do not change your saved pricing settings.</li>
          <li><strong>Check payments are unaffected</strong> — their amounts always come from the spreadsheet totals, not from the pricing table.</li>
        </ul>
        <div class="callout tip"><span class="callout-icon">💡</span><span>Before importing an old spreadsheet, check what rates were in effect at that time and enter them in the Pricing Override panel.</span></div>
      </div>
      <div class="subsection">
        <div class="subsection-title">13.3 &nbsp; Duplicate Detection</div>
        <p>The preview compares each collection's date against dates already in the app. Collections with a matching date are:</p>
        <ul class="guide-list">
          <li>Shown grayed out in the preview table</li>
          <li>Automatically unchecked (will not be imported by default)</li>
          <li>Labeled with a ⚠ "exists" warning</li>
        </ul>
        <p>You can manually check a duplicate to re-import it, which will <strong>add a second copy</strong> for that date — it does not overwrite the existing one. Delete the duplicate from History afterwards if it was unintentional.</p>
        <div class="callout warn"><span class="callout-icon">⚠</span><span>Duplicate detection is by date only. Two legitimate collections on the same date will both show the warning — manually check the second one to import it.</span></div>
      </div>
    </div>
  </div>
